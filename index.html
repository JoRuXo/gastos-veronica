  function closeModal() {
    document.getElementById("modal").classList.add("hidden");
    document.getElementById("sheet").innerHTML = "";
    editingId = null;
  }

  function saveFromModal() {
    var amt = parseAmount(document.getElementById("fAmount").value);
    if (isNaN(amt) || amt <= 0) {
      var f = document.getElementById("fAmount");
      f.focus();
      if (!document.getElementById("amtErr")) {
        var e = document.createElement("div");
        e.className = "note-err"; e.id = "amtErr"; e.style.marginTop = "6px";
        e.textContent = "Pon un importe válido.";
        f.closest(".field").appendChild(e);
      }
      return;
    }
    var note = document.getElementById("fNote").value.trim();
    var date = document.getElementById("fDate").value || todayISO();
    var esIngreso = formKind === "ingreso";
    var catFinal = esIngreso ? "otros" : formCat; // los ingresos no usan categoría de gasto
    var palabra = esIngreso ? "Ingreso" : "Gasto";

    if (editingId) {
      var ex = expenses.find(function (x) { return x.id === editingId; });
      if (ex) { ex.amount = amt; ex.categoryId = catFinal; ex.note = note; ex.date = date; ex.kind = formKind; }
      saveExpense(ex).then(function() { toast(palabra + " actualizado ✓"); });
    } else {
      var newExp = { id: uid(), amount: amt, categoryId: catFinal, note: note, date: date, kind: formKind, createdAt: Date.now() };
      expenses.push(newExp);
      saveExpense(newExp).then(function() { toast(palabra + " guardado ✓"); });
    }
    var d = new Date(date + "T00:00:00");
    viewYear = d.getFullYear(); viewMonth = d.getMonth();
    closeModal();
    render();
  }

  function deleteCurrent() {
    if (!editingId) return;
    var idToDel = editingId;
    expenses = expenses.filter(function (x) { return x.id !== idToDel; });
    deleteExpense(idToDel).then(function() { toast("Gasto eliminado"); });
    closeModal();
    render();
  }

  // ---------- Scan ticket via API ----------
  function fileToBase64(file) {
    return new Promise(function (resolve, reject) {
      var r = new FileReader();
      r.onload = function () {
        var res = String(r.result);
        var comma = res.indexOf(",");
        resolve(comma > -1 ? res.slice(comma + 1) : res);
      };
      r.onerror = function () { reject(new Error("No se pudo leer la imagen")); };
      r.readAsDataURL(file);
    });
  }

  function scanPrompt() {
    var ids = CATS.filter(function (c) { return c.id !== "sin_clasificar"; })
      .map(function (c) { return c.id + " (" + c.label + ")"; }).join(", ");
    return "Eres un asistente que registra gastos personales. El archivo puede ser: (a) un ticket o recibo de compra, (b) una captura de la app del banco, o (c) un PDF del extracto del banco (puede tener VARIAS páginas: procesa los movimientos de TODAS las páginas). " +
      "Extrae SOLO los gastos (cargos, compras, pagos, salidas de dinero). Ignora ingresos, abonos, nóminas, devoluciones, transferencias y bizums recibidos. " +
      "En el extracto del banco Santander: usa la 'Fecha operación' (NO la 'F. valor' que aparece debajo); el importe en NEGATIVO (con '-') es un gasto, el positivo es un ingreso y NO se apunta. " +
      "Devuelve ÚNICAMENTE JSON válido, sin markdown ni texto extra, con esta forma exacta: " +
      '{"movimientos":[{"importe": number, "fecha": "YYYY-MM-DD" | null, "concepto": "texto" | null, "categoria": "id" | null, "seguro": true | false}]}. ' +
      "Reglas: importe siempre POSITIVO, número con punto decimal (ej. 12.45). " +
      "fecha en formato YYYY-MM-DD si aparece, si no null. " +
      "concepto = nombre del comercio o descripción del movimiento tal como aparece. " +
      "categoria = el id que MEJOR encaje de esta lista: " + ids + ". " +
      "El usuario vive en Aalsmeer (Países Bajos) y a veces gasta en Valencia (España). " +
      "Si en un movimiento del banco aparece el nombre de un comercio o establecimiento que no reconoces (códigos tipo 'CCV*...', 'SUMUP*...', 'PAYPAL*...', nombres de tiendas o bares), USA la herramienta de búsqueda web para averiguar qué tipo de negocio es y dónde está, y así clasificarlo correctamente. " +
      "Muchos cobros llevan un prefijo de la pasarela de pago antes de un asterisco (CCV*, SUMUP*, PAYPAL*, BCK*, GOC*, NYX*, etc.): el comercio real es lo que va DESPUÉS del asterisco; usa esa parte para identificarlo. " +
      "'Www.Ovpay.Nl' y los códigos crípticos que empiezan por 'Nlov' son cobros del transporte público holandés (OV): clasifícalos como transporte. " +
      'Pon "seguro": true SOLO si estás razonablemente seguro de la categoría (tras buscar si hace falta). ' +
      'Si entiendes el gasto pero no encaja en ninguna categoría, usa "otros". ' +
      'Si NO logras saber de qué es el gasto ni siquiera tras buscar (concepto críptico, ilegible o ambiguo), usa "categoria": null y "seguro": false. No inventes. ' +
      "Si un ticket tiene un único total, devuelve un solo movimiento con ese total. " +
      'Si no hay ningún gasto, devuelve {"movimientos":[]}. ' +
      "IMPORTANTE: tu salida final debe ser ÚNICAMENTE el objeto JSON, sin ningún texto antes ni después.";
  }

  function callVisionAPI(file) {
    return fileToBase64(file).then(function (b64) {
      var isPdf = (file.type === "application/pdf") || /\.pdf$/i.test(file.name || "");
      var media = isPdf
        ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } }
        : { type: "image", source: { type: "base64", media_type: (file.type && file.type.indexOf("image/") === 0 ? file.type : "image/jpeg"), data: b64 } };
      return fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 8000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{
            role: "user",
            content: [ media, { type: "text", text: scanPrompt() } ]
          }]
        })
      });
    }).then(function (res) { return res.json(); });
  }

  function extractJsonObject(text) {
    if (!text) return "{}";
    var key = text.indexOf('"movimientos"');
    if (key > -1) {
      var start = text.lastIndexOf("{", key);
      var end = text.lastIndexOf("}");
      if (start > -1 && end > start) return text.slice(start, end + 1);
    }
    var m = text.match(/\{[\s\S]*\}/);
    return m ? m[0] : "{}";
  }

  function mapMovement(m) {
    var amt = (typeof m.importe === "number") ? m.importe : parseAmount(m.importe);
    amt = Math.abs(amt);
    var clear = m.categoria && CAT_MAP[m.categoria] && m.categoria !== "sin_clasificar" && m.seguro === true;
    return {
      amount: amt,
      date: m.fecha || todayISO(),
      note: m.concepto || "",
      categoryId: clear ? m.categoria : "sin_clasificar"
    };
  }

  function handleScan(file) {
    if (!file) return;
    openModal({ statusHTML: '<div class="scan-status"><div class="spinner"></div><div>Analizando la imagen y buscando los establecimientos… puede tardar unos segundos.</div></div>', date: todayISO() });
    callVisionAPI(file).then(function (data) {
      if (!data || data.error || !data.content) throw new Error("respuesta vacía");
      var text = data.content.map(function (b) { return b.type === "text" ? b.text : ""; }).join("\n");
      var clean = text.replace(/```json/g, "").replace(/```/g, "").trim();
      var parsed = JSON.parse(extractJsonObject(clean));
      var list = (parsed.movimientos || []).map(mapMovement).filter(function (x) { return x.amount > 0; });

      if (list.length === 0) {
        openModal({ date: todayISO(), statusHTML: '<div class="scan-status"><div>No detecté ningún gasto en la imagen. Rellénalo a mano.</div></div>' });
      } else if (list.length === 1) {
        var x = list[0];
        var dup = isDuplicate(x);
        var unclear = x.categoryId === "sin_clasificar";
        var statusHTML = dup
          ? '<div class="scan-status" style="background:#FFF8E1;color:#7A5C00"><div>⚠ Este gasto parece que ya está guardado (misma fecha e importe). Revísalo antes de guardar.</div></div>'
          : (unclear
              ? '<div class="scan-status"><div>Leí el importe, pero no tengo claro de qué es. Escribe el concepto y pulsa "Deducir", o elige la categoría.</div></div>'
              : '<div class="scan-status" style="background:var(--income-soft);color:#15803D"><div>✓ Leído y clasificado. Revisa y guarda.</div></div>');
        openModal({ amount: x.amount, date: x.date, note: x.note, categoryId: x.categoryId, statusHTML: statusHTML });
      } else {
        openMultiReview(list);
      }
    }).catch(function (err) {
      console.error("scan error", err);
      openModal({ date: todayISO(), statusHTML: '<div class="scan-status"><div>No pude leer la imagen automáticamente. Rellénalo a mano.</div></div>' });
    });
  }

  // ---------- Anti-duplicados ----------
  function isDuplicate(candidate) {
    var matchCount = expenses.filter(function (e) {
      return e.date === candidate.date && Math.abs(e.amount - candidate.amount) < 0.02;
    }).length;
    if (matchCount === 0) return false;
    // Si ya hay tantas instancias como las que hay en el candidato, es duplicado
    return true;
  }

  // ---------- Multi-movement review ----------
  function catOptions(selected) {
    return CATS.map(function (c) {
      return '<option value="' + c.id + '"' + (c.id === selected ? " selected" : "") + '>' + c.emoji + " " + esc(c.label) + '</option>';
    }).join("");
  }

  function openMultiReview(list) {
    editingId = null;
    var newItems = [], dupItems = [];
    list.forEach(function (x) {
      if (isDuplicate(x)) dupItems.push(x); else newItems.push(x);
    });
    var nUnclear = newItems.filter(function (x) { return x.categoryId === "sin_clasificar"; }).length;

    function buildRow(x, i, isDup) {
      var esIngreso = x.kind === "ingreso";
      var unclear = !isDup && !esIngreso && x.categoryId === "sin_clasificar";
      var cls = isDup ? " dup" : (unclear ? " unclear" : "");
      return '<div class="rev-row' + cls + '" data-i="' + i + '" data-dup="' + (isDup ? "1" : "0") + '" data-kind="' + (esIngreso ? "ingreso" : "gasto") + '">' +
        (isDup
          ? '<div class="dup-badge">✓ ya guardado</div>'
          : (esIngreso
              ? '<div class="dup-badge" style="background:var(--primary-soft);color:var(--primary)">💰 Ingreso</div>'
              : (unclear ? '<div class="rev-flag">⚠ No sé de qué es — corrígelo</div>' : ''))) +
        (!isDup ? '<button class="rev-del" data-del="' + i + '">×</button>' : '') +
        '<div class="rev-top">' +
        '<input class="rev-concept" data-f="note" placeholder="¿De qué es?" value="' + esc(x.note) + '"' + (isDup ? ' readonly' : '') + '>' +
        '<input class="rev-amt" data-f="amount" inputmode="decimal" value="' + String(x.amount).replace(".", ",") + '"' + (isDup ? ' readonly' : '') + '>' +
        '</div>' +
        '<div class="rev-line2">' +
        (esIngreso
          ? '<div style="flex:1;font-size:12.5px;color:var(--muted);padding:9px 2px">Entrada de dinero (sin categoría)</div>'
          : '<select data-f="cat"' + (isDup ? ' disabled' : '') + '>' + catOptions(x.categoryId) + '</select>') +
        '<input class="rev-date" data-f="date" type="date" value="' + esc(x.date) + '"' + (isDup ? ' readonly' : '') + '>' +
        '</div>' +
        (isDup ? '<button class="force-add-btn" data-force="1">Añadir igualmente</button>' : '') +
        '</div>';
    }

    var newRows = newItems.map(function (x, i) { return buildRow(x, i, false); }).join("");
    var dupRows = dupItems.map(function (x, i) { return buildRow(x, newItems.length + i, true); }).join("");
    var dupSection = dupItems.length > 0
      ? '<div class="dup-section-head"><span>' + dupItems.length + ' ya guardado' + (dupItems.length > 1 ? 's' : '') + ' (omitidos)</span>' +
        '<button class="dup-toggle" id="dupToggle">Ver ▾</button></div>' +
        '<div id="dupList" style="display:none">' + dupRows + '</div>'
      : '';

    var countMsg = newItems.length > 0
      ? 'Detecté <b>' + newItems.length + '</b> nuevo' + (newItems.length !== 1 ? 's' : '')
      : 'Todos los movimientos ya están guardados';
    if (nUnclear) countMsg += ' · <span style="color:var(--accent)">' + nUnclear + ' sin clasificar</span>';

    var sheet = document.getElementById("sheet");
    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>Revisar movimientos</h2>' +
      '<div class="rev-count">' + countMsg + '</div>' +
      '<div id="revList">' + newRows + '</div>' +
      dupSection +
      '<div class="sheet-actions">' +
      (newItems.length > 0
        ? '<button class="btn save-btn" id="addAllBtn">Añadir ' + newItems.length + ' nuevo' + (newItems.length !== 1 ? 's' : '') + '</button>'
        : '<button class="btn btn-ghost" id="addAllBtn" style="flex:1" onclick="closeModal()">Cerrar</button>') +
      '</div>';

    document.getElementById("modal").classList.remove("hidden");

    document.getElementById("revList").addEventListener("click", function (ev) {
      var d = ev.target.closest("[data-del]");
      if (!d) return;
      var row = d.closest(".rev-row");
      if (row) row.parentNode.removeChild(row);
      var remaining = document.querySelectorAll("#revList .rev-row").length;
      if (remaining === 0 && dupItems.length === 0) { closeModal(); return; }
      var btn = document.getElementById("addAllBtn");
      if (btn && remaining > 0) btn.textContent = "Añadir " + remaining + " nuevo" + (remaining !== 1 ? "s" : "");
      else if (btn && remaining === 0) { btn.textContent = "Cerrar"; btn.onclick = closeModal; }
    });

    var dupToggle = document.getElementById("dupToggle");
    if (dupToggle) dupToggle.addEventListener("click", function () {
      var dl = document.getElementById("dupList");
      var open = dl.style.display !== "none";
      dl.style.display = open ? "none" : "block";
      this.textContent = open ? "Ver ▾" : "Ocultar ▴";
    });

    // Force-add desde duplicados
    var dupList = document.getElementById("dupList");
    if (dupList) dupList.addEventListener("click", function (ev) {
      var fb = ev.target.closest("[data-force]");
      if (!fb) return;
      var row = fb.closest(".rev-row");
      if (!row) return;
      row.classList.remove("dup");
      row.removeAttribute("data-dup");
      Array.prototype.forEach.call(row.querySelectorAll("input,select"), function (el) {
        el.removeAttribute("readonly"); el.removeAttribute("disabled");
      });
      fb.parentNode.removeChild(fb);
      document.getElementById("revList").appendChild(row);
      var btn = document.getElementById("addAllBtn");
      var n = document.querySelectorAll("#revList .rev-row").length;
      if (btn) btn.textContent = "Añadir " + n + " nuevo" + (n !== 1 ? "s" : "");
    });

    if (newItems.length > 0) document.getElementById("addAllBtn").addEventListener("click", addAllFromReview);
  }

  function addAllFromReview() {
    var rows = document.querySelectorAll("#revList .rev-row");
    var toSave = [], lastDate = todayISO();
    Array.prototype.forEach.call(rows, function (row) {
      if (row.getAttribute("data-dup") === "1") return;
      var amt = parseAmount(row.querySelector('[data-f="amount"]').value);
      if (isNaN(amt) || amt <= 0) return;
      var dt = row.querySelector('[data-f="date"]').value || todayISO();
      lastDate = dt;
      var esIngreso = row.getAttribute("data-kind") === "ingreso";
      var catSel = row.querySelector('[data-f="cat"]');
      var exp = {
        id: uid(), amount: amt,
        categoryId: esIngreso ? "otros" : (catSel ? catSel.value : "sin_clasificar"),
        note: row.querySelector('[data-f="note"]').value.trim(),
        date: dt, kind: esIngreso ? "ingreso" : "gasto", createdAt: Date.now()
      };
      expenses.push(exp);
      toSave.push(exp);
    });
    if (toSave.length === 0) { toast("Revisa los importes"); return; }
    var d = new Date(lastDate + "T00:00:00");
    viewYear = d.getFullYear(); viewMonth = d.getMonth();
    // Guardar todos de golpe en Supabase
    var rows2save = toSave.map(function(exp) {
      return { id: exp.id, amount: exp.amount, category_id: exp.categoryId, note: exp.note || "", date: exp.date, kind: exp.kind };
    });
    sb.from("gastos").upsert(rows2save).then(function(res) {
      if (res.error) { console.error("addAllFromReview", res.error); toast("Error al guardar 😕"); return; }
      toast(toSave.length + (toSave.length > 1 ? " gastos añadidos ✓" : " gasto añadido ✓"));
    });
    closeModal(); render();
  }

  // ---------- Classify from text ----------
  function classifyFromText(text, onDone) {
    var ids = CATS.filter(function (c) { return c.id !== "sin_clasificar"; }).map(function (c) { return c.id + " (" + c.label + ")"; }).join(", ");
    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1024,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: 'Clasifica este gasto en una categoría. Concepto: "' + text + '". El usuario vive en Aalsmeer (Países Bajos). Si el concepto es un nombre de comercio o establecimiento que no reconoces, busca en la web qué tipo de negocio es. Categorías (id y significado): ' + ids + '. Tu última palabra debe ser SOLO el id que mejor encaje. Si no encaja en ninguna, responde otros.' }]
      })
    }).then(function (r) { return r.json(); }).then(function (data) {
      var t = (data.content || []).map(function (b) { return b.type === "text" ? b.text : ""; }).join(" ").toLowerCase();
      var tokens = t.split(/[^a-z_]+/).filter(Boolean);
      var found = "otros";
      for (var i = tokens.length - 1; i >= 0; i--) { if (CAT_MAP[tokens[i]] && tokens[i] !== "sin_clasificar") { found = tokens[i]; break; } }
      onDone(found);
    }).catch(function () { onDone(null); });
  }

  // ---------- Paste movements (from chat) ----------
  function parsePasted(text) {
    var out = [];
    text.split(/\r?\n/).forEach(function (line) {
      line = line.trim();
      if (!line || /^fecha\b/i.test(line)) return;
      var parts = line.split(/[;\t|]/).map(function (s) { return s.trim(); });
      // Detectar y separar el tipo (gasto/ingreso) si viene en la línea
      var kind = "gasto";
      var lc = parts.map(function (p) { return p.toLowerCase(); });
      var ki = lc.indexOf("ingreso");
      if (ki > -1) { kind = "ingreso"; parts.splice(ki, 1); }
      else { var kg = lc.indexOf("gasto"); if (kg > -1) parts.splice(kg, 1); }
      var date = null, catId = null, amount = NaN, note = "";
      if (parts.length >= 4) {
        date = parts[0]; catId = parts[1]; amount = parseAmount(parts[2]); note = parts.slice(3).join(" ");
      } else if (parts.length === 3) {
        if (/\d{4}-\d{2}-\d{2}/.test(parts[0])) { date = parts[0]; amount = parseAmount(parts[1]); note = parts[2]; }
        else { catId = parts[0]; amount = parseAmount(parts[1]); note = parts[2]; }
      } else if (parts.length === 2) {
        amount = parseAmount(parts[0]); note = parts[1];
      }
      if (isNaN(amount) || amount <= 0) {
        for (var i = 0; i < parts.length; i++) { var a = parseAmount(parts[i]); if (!isNaN(a) && a > 0) { amount = a; break; } }
      }
      if (isNaN(amount) || amount <= 0) return;
      out.push({
        amount: Math.abs(amount),
        date: (date && /\d{4}-\d{2}-\d{2}/.test(date)) ? date : todayISO(),
        note: note || "",
        kind: kind,
        categoryId: kind === "ingreso" ? "otros" : ((catId && CAT_MAP[catId]) ? catId : "sin_clasificar")
      });
    });
    return out;
  }

  function openPasteSheet() {
    editingId = null;
    var sheet = document.getElementById("sheet");
    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>Pegar movimientos</h2>' +
      '<div class="cat-hint">Pega aquí el listado que te paso en el chat (un gasto por línea) y pulsa Procesar. Podrás revisar todo antes de guardar.</div>' +
      '<textarea id="pasteArea" class="txt-input" style="min-height:150px;font-family:monospace;font-size:12.5px;resize:vertical" placeholder="2026-06-04;super;23,40;Albert Heijn&#10;2026-06-03;comer;12,50;Bar Lola"></textarea>' +
      '<div id="pasteErr" class="note-err" style="margin-top:8px;display:none">No reconocí ningún gasto. Revisa el texto.</div>' +
      '<div class="sheet-actions"><button class="btn save-btn" id="procPaste">Procesar</button></div>';
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("procPaste").addEventListener("click", function () {
      var txt = document.getElementById("pasteArea").value;
      var list = parsePasted(txt);
      if (list.length === 0) { document.getElementById("pasteErr").style.display = "block"; return; }
      if (list.length === 1) {
        var x = list[0];
        openModal({ amount: x.amount, date: x.date, note: x.note, categoryId: x.categoryId, kind: x.kind,
          statusHTML: '<div class="scan-status" style="background:var(--income-soft);color:#15803D"><div>✓ Revisa y guarda.</div></div>' });
      } else {
        openMultiReview(list);
      }
    });
    setTimeout(function () { var a = document.getElementById("pasteArea"); if (a) a.focus(); }, 250);
  }

  // ---------- CSV export ----------
  function exportCSV() {
    if (expenses.length === 0) { toast("No hay nada que exportar"); return; }
    var rows = [["Fecha", "Tipo_mov", "Categoria", "Tipo", "Concepto", "Importe_EUR"]];
    expenses.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; }).forEach(function (e) {
      var c = cat(e.categoryId);
      rows.push([e.date, (e.kind === "ingreso" ? "ingreso" : "gasto"), c.label, c.type, (e.note || "").replace(/"/g, "'"), String(e.amount).replace(".", ",")]);
    });
    var csv = rows.map(function (r) {
      return r.map(function (cell) { return '"' + cell + '"'; }).join(";");
    }).join("\n");
    var blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "gastos_" + todayISO() + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast("CSV descargado ✓");
  }

  // ---------- Toast ----------
  var toastTimer = null;
  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }

  // ---------- Events ----------
  function wire() {
    document.getElementById("prevMonth").addEventListener("click", function () {
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render();
    });
    document.getElementById("nextMonth").addEventListener("click", function () {
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render();
    });
    document.getElementById("tabResumen").addEventListener("click", function () { view = "resumen"; render(); });
    document.getElementById("tabMov").addEventListener("click", function () { view = "movimientos"; render(); });
    document.getElementById("tabEvol").addEventListener("click", function () { view = "evolucion"; render(); });
    document.getElementById("tabCal").addEventListener("click", function () { view = "calendario"; render(); });
    document.getElementById("tabDeudas").addEventListener("click", function () { view = "deudas"; render(); });
    document.getElementById("delMonthBtn").addEventListener("click", deleteMonth);
    document.getElementById("accountBtn").addEventListener("click", openAccountSheet);
    document.getElementById("addBtn").addEventListener("click", function () { openModal({}); });
    document.getElementById("pasteBtn").addEventListener("click", openPasteSheet);
    document.getElementById("scanInput").addEventListener("change", function (ev) {
      var f = ev.target.files && ev.target.files[0];
      this.value = "";
      handleScan(f);
    });
    document.getElementById("scrim").addEventListener("click", closeModal);
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("exportBtn").addEventListener("click", exportCSV);
    document.getElementById("exportBtn2").addEventListener("click", exportCSV);

    document.getElementById("content").addEventListener("click", function (ev) {
      // Marcar una deuda como pagada
      var settleBtn = ev.target.closest(".debt-settle");
      if (settleBtn) {
        ev.stopPropagation();
        var sId = settleBtn.getAttribute("data-settle-id");
        var deuda = debts.find(function (x) { return x.id === sId; });
        if (deuda) {
          deuda.settled = true;
          saveDebt(deuda).then(function () { toast("Marcada como pagada ✓"); });
          render();
        }
        return;
      }
      // Borrar una deuda
      var debtDelBtn = ev.target.closest(".debt-del");
      if (debtDelBtn) {
        ev.stopPropagation();
        var ddId = debtDelBtn.getAttribute("data-del-debt-id");
        var deuda2 = debts.find(function (x) { return x.id === ddId; });
        var etiqueta2 = deuda2 ? deuda2.persona : "esta deuda";
        if (window.confirm("¿Borrar la deuda con \"" + etiqueta2 + "\"?")) {
          debts = debts.filter(function (x) { return x.id !== ddId; });
          deleteDebt(ddId).then(function () { toast("Deuda eliminada"); });
          render();
        }
        return;
      }
      // Ajustar importe de una deuda
      var debtAdjBtn = ev.target.closest(".debt-adjust");
      if (debtAdjBtn) {
        ev.stopPropagation();
        var adjId = debtAdjBtn.getAttribute("data-adjust-id");
        var deuda3 = debts.find(function (x) { return x.id === adjId; });
        if (deuda3) openAdjustDebtModal(deuda3);
        return;
      }
      // Editar una deuda al tocarla
      var debtItem = ev.target.closest(".item[data-debt-id]");
      if (debtItem) {
        var did = debtItem.getAttribute("data-debt-id");
        var dd = debts.find(function (x) { return x.id === did; });
        if (dd) openDebtModal({ id: dd.id, persona: dd.persona, amount: dd.amount, direction: dd.direction, note: dd.note, date: dd.date });
        return;
      }
      // Botón de borrar de un movimiento (sin abrir la edición)
      var delBtn = ev.target.closest(".item-del");
      if (delBtn) {
        ev.stopPropagation();
        var delId = delBtn.getAttribute("data-del-id");
        var mov = expenses.find(function (x) { return x.id === delId; });
        var etiqueta = mov ? (mov.note || cat(mov.categoryId).label) : "este movimiento";
        if (window.confirm("¿Borrar \"" + etiqueta + "\"?")) {
          expenses = expenses.filter(function (x) { return x.id !== delId; });
          deleteExpense(delId).then(function () { toast("Movimiento eliminado"); });
          render();
        }
        return;
      }
      // Tocar un día del calendario
      var cell = ev.target.closest(".cal-cell");
      if (cell && !cell.classList.contains("empty")) {
        openDayDetail(cell.getAttribute("data-day"));
        return;
      }
      // Expandir/colapsar categoría
      var head = ev.target.closest(".catbar-head");
      if (head) {
        var wrap = head.closest(".catbar-wrap");
        if (wrap) {
          var cid = wrap.getAttribute("data-cat");
          openCats[cid] = !openCats[cid];
          wrap.classList.toggle("open", !!openCats[cid]);
        }
        return;
      }
      // Editar desde el detalle de categoría
      var ci = ev.target.closest(".catbar-item");
      if (ci) {
        var id = ci.getAttribute("data-id");
        var e = expenses.find(function (x) { return x.id === id; });
        if (e) openModal({ id: e.id, amount: e.amount, categoryId: e.categoryId, note: e.note, date: e.date, kind: e.kind });
        return;
      }
      // Editar desde la lista de movimientos
      var it = ev.target.closest(".item");
      if (!it) return;
      var id2 = it.getAttribute("data-id");
      var e2 = expenses.find(function (x) { return x.id === id2; });
      if (e2) openModal({ id: e2.id, amount: e2.amount, categoryId: e2.categoryId, note: e2.note, date: e2.date, kind: e2.kind });
    });
  }

  // ---------- Init ----------
  wire();
  initAuth();
})();
</script>
