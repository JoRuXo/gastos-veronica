<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#14543C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gastos Vero">
  <meta name="description" content="Control de gastos personales">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Gastos Verónica</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F4EEE2;
  --bg2: #ECE4D4;
  --surface: #FFFFFF;
  --ink: #1E231D;
  --muted: #6F756B;
  --faint: #9AA095;
  --line: #E7DFD0;
  --primary: #14543C;
  --primary-d: #0E3F2D;
  --primary-soft: #E2EDE6;
  --accent: #D9803B;
  --accent-soft: #FBEAD9;
  --danger: #BF463E;
  --radius: 22px;
  --radius-sm: 14px;
  --shadow: 0 10px 30px rgba(20,45,32,.09);
  --shadow-sm: 0 4px 14px rgba(20,45,32,.07);
}

body { background: var(--bg); }

#app {
  font-family: 'Hanken Grotesk', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background:
    radial-gradient(1200px 500px at 80% -10%, rgba(20,84,60,.06), transparent 60%),
    radial-gradient(900px 400px at -10% 10%, rgba(217,128,59,.06), transparent 55%),
    var(--bg);
  padding: 18px 14px 0;
}

.phone {
  width: 100%;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  padding-bottom: 96px;
}

/* ---------- Header ---------- */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand .mark {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(150deg, var(--primary), var(--primary-d));
  display: grid; place-items: center; color: #fff; font-size: 19px;
  box-shadow: var(--shadow-sm);
}
.brand h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; letter-spacing: -.01em; }
.brand p { font-size: 11.5px; color: var(--muted); margin-top: -1px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--line);
  background: var(--surface); color: var(--ink); font-size: 16px; cursor: pointer;
  display: grid; place-items: center; transition: .15s;
}
.icon-btn:active { transform: scale(.94); }

/* ---------- Hero card ---------- */
.hero {
  background: linear-gradient(155deg, var(--primary), var(--primary-d));
  border-radius: var(--radius);
  padding: 20px 22px 18px;
  color: #fff;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: ''; position: absolute; right: -40px; top: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.14), transparent 70%);
  pointer-events: none;
}
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.month-nav .label { font-size: 13.5px; font-weight: 600; letter-spacing: .01em; text-transform: capitalize; }
.month-nav button {
  width: 30px; height: 30px; border-radius: 9px; border: none; cursor: pointer;
  background: rgba(255,255,255,.14); color: #fff; font-size: 15px; display: grid; place-items: center;
  transition: .15s; position: relative; z-index: 1; user-select: none; -webkit-user-select: none;
}
.month-nav button:active { transform: scale(.9); }
.hero .total-lbl { font-size: 12px; opacity: .8; letter-spacing: .04em; text-transform: uppercase; }
.hero .total {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 42px; line-height: 1.05;
  margin-top: 2px; font-variant-numeric: tabular-nums; letter-spacing: -.02em;
}
.hero .split { display: flex; gap: 10px; margin-top: 16px; }
.hero .split .pill {
  flex: 1; background: rgba(255,255,255,.10); border-radius: 12px; padding: 9px 12px;
}
.hero .split .pill .k { font-size: 10.5px; opacity: .8; letter-spacing: .03em; text-transform: uppercase; }
.hero .split .pill .v { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; margin-top: 1px; font-variant-numeric: tabular-nums; }

/* ---------- Actions ---------- */
.actions { display: flex; gap: 10px; margin: 14px 0 4px; }
.btn {
  flex: 1; border: none; border-radius: var(--radius-sm); padding: 14px 12px; cursor: pointer;
  font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 14.5px;
  display: flex; align-items: center; justify-content: center; gap: 8px; transition: .15s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(217,128,59,.28); }
.btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
.btn .ic { font-size: 16px; }

/* ---------- Tabs ---------- */
.tabs { display: flex; gap: 6px; background: var(--bg2); border-radius: 13px; padding: 4px; margin: 16px 0 14px; }
.tabs button {
  flex: 1; border: none; background: transparent; padding: 9px; border-radius: 10px; cursor: pointer;
  font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 13.5px; color: var(--muted); transition: .18s;
}
.tabs button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow-sm); }

/* ---------- Cards / sections ---------- */
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 18px; margin-bottom: 14px; }
.card h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; margin-bottom: 14px; }

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 18px; }
.donut-wrap svg { flex-shrink: 0; }
.donut-center { font-family: 'Fraunces', serif; }
.legend { flex: 1; display: flex; flex-direction: column; gap: 7px; min-width: 0; }
.legend .row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend .nm { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.legend .am { font-weight: 600; font-variant-numeric: tabular-nums; }

/* Category bars — expandable */
.catbar-wrap { margin-bottom: 11px; }
.catbar-wrap:last-child { margin-bottom: 0; }
.catbar-head { display: flex; align-items: center; gap: 9px; cursor: pointer; padding: 3px 0; }
.catbar-head .emoji { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.catbar-head .lbl { flex: 1; font-size: 13.5px; font-weight: 500; }
.catbar-head .amt { font-weight: 600; font-size: 13.5px; font-variant-numeric: tabular-nums; }
.catbar-head .pct { font-size: 11px; color: var(--faint); margin-left: 4px; }
.catbar-head .toggle { font-size: 16px; color: var(--faint); margin-left: 4px; transition: transform .25s; line-height: 1; }
.catbar-wrap.open .toggle { transform: rotate(90deg); }
.catbar-track { height: 7px; background: var(--bg2); border-radius: 6px; overflow: hidden; margin: 7px 0 0; }
.catbar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
.catbar-items { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.catbar-wrap.open .catbar-items { max-height: 1000px; }
.catbar-list { margin-top: 8px; border-top: 1px solid var(--line); }
.catbar-item { display: flex; align-items: center; gap: 8px; padding: 9px 4px 9px 32px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s; border-radius: 6px; }
.catbar-item:last-child { border-bottom: none; }
.catbar-item:active { background: var(--bg2); }
.catbar-item .ci-date { font-size: 11px; color: var(--faint); width: 44px; flex-shrink: 0; }
.catbar-item .ci-note { flex: 1; font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.catbar-item .ci-amt { font-family: 'Fraunces', serif; font-weight: 600; font-size: 13.5px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.catbar-item .ci-chev { color: var(--faint); font-size: 13px; margin-left: 3px; flex-shrink: 0; }

/* Movimientos list */
.day-group { margin-bottom: 16px; }
.day-label { font-size: 11.5px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; margin: 0 4px 8px; }
.item {
  display: flex; align-items: center; gap: 12px; background: var(--surface);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
  box-shadow: var(--shadow-sm); transition: .15s; border: 1px solid transparent;
}
.item:active { transform: scale(.99); border-color: var(--line); }
.item .ico { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
.item .mid { flex: 1; min-width: 0; }
.item .mid .t { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item .mid .s { font-size: 12px; color: var(--muted); margin-top: 1px; }
.item .amt { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; font-variant-numeric: tabular-nums; }
.item .chev { color: var(--faint); font-size: 20px; margin-left: 6px; line-height: 1; }
.edit-hint { font-size: 11.5px; color: var(--faint); text-align: center; margin: 0 0 12px; }
.visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

/* Empty state */
.empty { text-align: center; padding: 38px 20px; color: var(--muted); }
.empty .big { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 13.5px; line-height: 1.5; }
.empty .hint { font-size: 12px; color: var(--faint); margin-top: 4px; }

/* footer */
.foot { text-align: center; padding: 6px 0 20px; }
.foot button { background: none; border: none; color: var(--primary); font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 13px; cursor: pointer; text-decoration: underline; }
.foot p { font-size: 11px; color: var(--faint); margin-top: 6px; line-height: 1.5; }

/* ---------- Modal ---------- */
.modal { position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
.modal.hidden { display: none; }
.modal .scrim { position: absolute; inset: 0; background: rgba(20,30,22,.42); backdrop-filter: blur(2px); }
.sheet {
  position: relative; width: 100%; max-width: 460px; background: var(--bg);
  border-radius: 26px 26px 0 0; padding: 8px 20px calc(20px + env(safe-area-inset-bottom));
  box-shadow: 0 -10px 40px rgba(0,0,0,.18); max-height: 92vh; overflow-y: auto;
  animation: rise .26s cubic-bezier(.2,.8,.2,1);
}
@keyframes rise { from { transform: translateY(100%); } to { transform: translateY(0); } }
.grab { width: 40px; height: 4px; border-radius: 4px; background: var(--line); margin: 6px auto 14px; }
.sheet h2 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; margin-bottom: 16px; }
.field { margin-bottom: 16px; }
.field > label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: .02em; }
.amount-input { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--line); border-radius: 14px; padding: 4px 16px; }
.amount-input span { font-family: 'Fraunces', serif; font-size: 26px; color: var(--muted); }
.amount-input input { border: none; outline: none; background: none; font-family: 'Fraunces', serif; font-weight: 600; font-size: 30px; width: 100%; padding: 10px 8px; color: var(--ink); font-variant-numeric: tabular-nums; }
.txt-input, .date-input {
  display: block; width: 100%; border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 14px;
  font-family: 'Hanken Grotesk'; font-size: 15px; background: var(--surface); color: var(--ink); outline: none;
}
.btn, .tabs button, .icon-btn, .cat-chip { user-select: none; -webkit-user-select: none; }
.txt-input:focus, .date-input:focus, .amount-input:focus-within { border-color: var(--primary); }
.cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.cat-chip {
  display: flex; align-items: center; gap: 8px; padding: 10px 11px; border-radius: 12px;
  border: 1.5px solid var(--line); background: var(--surface); cursor: pointer; transition: .15s; font-size: 12.5px; font-weight: 500;
  text-align: left;
}
.cat-chip .e { font-size: 16px; }
.cat-chip.on { border-color: var(--primary); background: var(--primary-soft); }
.cat-chip span.nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
.sheet-actions .btn { padding: 15px; }
.save-btn { background: var(--primary); color: #fff; }
.del-btn { background: var(--accent-soft); color: var(--danger); border: 1px solid #F2D6C4; flex: 0 0 54px; }

.scan-status { display: flex; align-items: center; gap: 12px; background: var(--accent-soft); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; font-size: 13.5px; color: #93501e; }
.spinner { width: 18px; height: 18px; border: 2.5px solid rgba(147,80,30,.25); border-top-color: #93501e; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.note-err { color: var(--danger); font-size: 12.5px; }

.deduce-btn { background: var(--primary-soft); color: var(--primary); border: none; border-radius: 9px; padding: 7px 11px; font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.deduce-btn:active { transform: scale(.96); }
.deduce-btn:disabled { opacity: .6; }
.spinner-sm { width: 13px; height: 13px; border: 2px solid rgba(20,84,60,.25); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
.cat-hint { background: var(--accent-soft); border-radius: 12px; padding: 11px 13px; font-size: 12.5px; color: #93501e; line-height: 1.45; margin-bottom: 12px; }

.rev-row { background: var(--surface); border: 1.5px solid var(--line); border-radius: 14px; padding: 12px; margin-bottom: 10px; position: relative; }
.rev-row.unclear { border-color: var(--accent); background: #FFFBF6; }
.rev-row.dup { opacity: .55; border-color: var(--line); background: var(--bg2); }
.rev-row.dup input, .rev-row.dup select { background: var(--bg2) !important; color: var(--muted); }
.dup-badge { display: inline-block; font-size: 10.5px; font-weight: 700; color: var(--muted); background: var(--line); border-radius: 6px; padding: 2px 8px; margin-bottom: 6px; letter-spacing: .02em; }
.dup-section-head { font-size: 12px; color: var(--muted); margin: 14px 0 8px; padding-top: 12px; border-top: 1px dashed var(--line); display: flex; align-items: center; justify-content: space-between; }
.dup-toggle { background: none; border: none; color: var(--primary); font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 12px; cursor: pointer; padding: 0; }
.force-add-btn { background: none; border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px; font-size: 11.5px; font-family: 'Hanken Grotesk'; font-weight: 600; color: var(--muted); cursor: pointer; margin-top: 6px; }
.rev-row .rev-top { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.rev-row .rev-concept { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: 'Hanken Grotesk'; font-size: 13.5px; outline: none; background: var(--bg); }
.rev-row .rev-amt { width: 92px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 13.5px; outline: none; text-align: right; background: var(--bg); }
.rev-row .rev-line2 { display: flex; gap: 8px; align-items: center; }
.rev-row select { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: 'Hanken Grotesk'; font-size: 13px; background: var(--bg); outline: none; -webkit-appearance: none; appearance: none; }
.rev-row .rev-date { width: 130px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 8px; font-family: 'Hanken Grotesk'; font-size: 12.5px; background: var(--bg); outline: none; }
.rev-row .rev-del { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--danger); color: #fff; font-size: 13px; cursor: pointer; box-shadow: var(--shadow-sm); }
.rev-flag { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
.rev-count { font-size: 12.5px; color: var(--muted); margin-bottom: 12px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 12px; font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none; transition: .25s; z-index: 80;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div class="phone">
    <div class="topbar">
      <div class="brand">
        <div class="mark">🌷</div>
        <div>
          <h1>Gastos Vero</h1>
          <p>Aalsmeer · en euros</p>
        </div>
      </div>
      <button class="icon-btn" id="exportBtn" title="Exportar">⬇</button>
    </div>

    <div class="hero">
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="label" id="monthLabel">—</span>
        <button id="nextMonth">›</button>
      </div>
      <div class="total-lbl">Gastado este mes</div>
      <div class="total" id="monthTotal">0,00 €</div>
      <div class="split">
        <div class="pill"><div class="k">Fijos</div><div class="v" id="fixedTotal">0 €</div></div>
        <div class="pill"><div class="k">Variables</div><div class="v" id="varTotal">0 €</div></div>
        <div class="pill"><div class="k">Apuntes</div><div class="v" id="countTotal">0</div></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="addBtn"><span class="ic">＋</span> Añadir gasto</button>
      <label class="btn btn-ghost" id="scanBtn" for="scanInput"><span class="ic">📷</span> Ticket o captura</label>
    </div>

    <div class="tabs">
      <button id="tabResumen" class="on">Resumen</button>
      <button id="tabMov">Movimientos</button>
    </div>

    <main id="content"></main>

    <div class="foot">
      <button id="pasteBtn">📋 Pegar movimientos (desde el chat)</button>
      <button id="exportBtn2" style="display:block;margin:10px auto 0">Exportar copia de seguridad (CSV)</button>
      <p>Tus datos se guardan en este dispositivo. Exporta de vez en cuando para tener un respaldo.</p>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal hidden" id="modal">
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet"></div>
  </div>

  <input type="file" id="scanInput" accept="image/*" class="visually-hidden">
  <div class="toast" id="toast"></div>
</div>
<script>
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
(function () {
  "use strict";

  // ---------- Config ----------
  var STORAGE_KEY = "gastos_vero_v1";
  var CATS = [
    { id: "vivienda",      label: "Habitación / Vivienda", emoji: "🏠", color: "#14543C", type: "fija" },
    { id: "suministros",   label: "Suministros y casa",    emoji: "💡", color: "#3A6B5A", type: "fija" },
    { id: "super",         label: "Supermercado",          emoji: "🛒", color: "#D9803B", type: "variable" },
    { id: "comer",         label: "Comer fuera / café",    emoji: "☕", color: "#C2602F", type: "variable" },
    { id: "transporte",    label: "Bici y transporte",     emoji: "🚲", color: "#4E8FA8", type: "fija" },
    { id: "coche",         label: "Coche",                 emoji: "🚗", color: "#6B8FA8", type: "fija" },
    { id: "viajes",        label: "Viajes y traslados",    emoji: "✈️", color: "#5B8FA8", type: "variable" },
    { id: "salud",         label: "Salud y seguro",        emoji: "⚕️", color: "#6F9E78", type: "fija" },
    { id: "telefono",      label: "Teléfono e internet",   emoji: "📱", color: "#5B6C8F", type: "fija" },
    { id: "suscripciones", label: "Suscripciones",         emoji: "📺", color: "#8E7CC3", type: "fija" },
    { id: "ropa",          label: "Ropa y cuidado",        emoji: "👕", color: "#B5838D", type: "variable" },
    { id: "valencia",      label: "Valencia y pareja",     emoji: "❤️", color: "#C9485B", type: "variable" },
    { id: "ocio",          label: "Ocio y salidas",        emoji: "🎉", color: "#E0A93C", type: "variable" },
    { id: "peluqueria",    label: "Peluquería",            emoji: "💈", color: "#9B72CF", type: "variable" },
    { id: "tramites",      label: "Trámites y comisiones", emoji: "📄", color: "#7C8079", type: "variable" },
    { id: "otros",         label: "Otros / imprevistos",   emoji: "✳️", color: "#9AA0A6", type: "variable" },
    { id: "sin_clasificar",label: "Sin clasificar",        emoji: "🔍", color: "#C98A3C", type: "variable" }
  ];
  var CAT_MAP = {};
  CATS.forEach(function (c) { CAT_MAP[c.id] = c; });

  // ---------- State ----------
  var expenses = [];
  var view = "resumen";
  var now = new Date();
  var viewYear = now.getFullYear();
  var viewMonth = now.getMonth(); // 0-11
  var editingId = null;
  var formCat = "super";
  var openCats = {};
  var hasStorage = (function () { try { localStorage.setItem('__t', '1'); localStorage.removeItem('__t'); return true; } catch (e) { return false; } })();

  // ---------- Helpers ----------
  function pad2(n) { return (n < 10 ? "0" : "") + n; }
  function monthKey(y, m) { return y + "-" + pad2(m + 1); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function eur(n) {
    return new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR" }).format(n || 0);
  }
  function eurShort(n) {
    var v = Math.round(n || 0);
    return new Intl.NumberFormat("es-ES").format(v) + " €";
  }
  function cat(id) { return CAT_MAP[id] || CAT_MAP["otros"]; }
  function todayISO() {
    var d = new Date();
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }
  function monthName(m) {
    return ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"][m];
  }
  function shortDate(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.getDate() + " " + monthName(d.getMonth()).slice(0, 3);
  }
  function byCategoryWithItems(arr) {
    var map = {}, items = {};
    arr.forEach(function (e) {
      map[e.categoryId] = (map[e.categoryId] || 0) + (e.amount || 0);
      if (!items[e.categoryId]) items[e.categoryId] = [];
      items[e.categoryId].push(e);
    });
    return Object.keys(map).map(function (id) {
      return { id: id, amount: map[id], items: (items[id] || []).slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; }) };
    }).sort(function (a, b) { return b.amount - a.amount; });
  }
  function parseAmount(str) {
    if (!str) return NaN;
    var s = String(str).trim().replace(/\s/g, "").replace(/€/g, "");
    // handle both 1.234,56 and 1234.56
    if (s.indexOf(",") > -1 && s.indexOf(".") > -1) {
      s = s.replace(/\./g, "").replace(",", ".");
    } else {
      s = s.replace(",", ".");
    }
    return parseFloat(s);
  }
  function dayLabel(iso) {
    var t = todayISO();
    var d = new Date(iso + "T00:00:00");
    var yest = new Date(); yest.setDate(yest.getDate() - 1);
    var yISO = yest.getFullYear() + "-" + pad2(yest.getMonth() + 1) + "-" + pad2(yest.getDate());
    if (iso === t) return "Hoy";
    if (iso === yISO) return "Ayer";
    var s = d.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- Storage ----------
  function loadData() {
    try {
      var raw = hasStorage ? localStorage.getItem(STORAGE_KEY) : null;
      expenses = raw ? (JSON.parse(raw) || []) : [];
    } catch (e) { expenses = []; }
    return Promise.resolve();
  }
  function saveData() {
    try {
      if (hasStorage) localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    } catch (e) {
      console.error("Error guardando", e);
      toast("No se pudo guardar 😕");
    }
    return Promise.resolve();
  }

  // ---------- Selectors / computations ----------
  function monthExpenses() {
    var key = monthKey(viewYear, viewMonth);
    return expenses.filter(function (e) { return (e.date || "").slice(0, 7) === key; });
  }
  function sum(arr) { return arr.reduce(function (a, e) { return a + (e.amount || 0); }, 0); }
  function byCategory(arr) {
    var map = {};
    arr.forEach(function (e) { map[e.categoryId] = (map[e.categoryId] || 0) + (e.amount || 0); });
    return Object.keys(map).map(function (id) { return { id: id, amount: map[id] }; })
      .sort(function (a, b) { return b.amount - a.amount; });
  }

  // ---------- Render: header ----------
  function renderHeader() {
    var me = monthExpenses();
    var total = sum(me);
    var fixed = sum(me.filter(function (e) { return cat(e.categoryId).type === "fija"; }));
    var vari = total - fixed;
    document.getElementById("monthLabel").textContent = monthName(viewMonth) + " " + viewYear;
    document.getElementById("monthTotal").textContent = eur(total);
    document.getElementById("fixedTotal").textContent = eurShort(fixed);
    document.getElementById("varTotal").textContent = eurShort(vari);
    document.getElementById("countTotal").textContent = me.length;
  }

  // ---------- Render: donut ----------
  function donutSVG(segments, total) {
    var size = 116, stroke = 18, r = (size - stroke) / 2, c = 2 * Math.PI * r, cx = size / 2;
    var parts = "", offset = 0;
    if (total <= 0) {
      parts = '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="#ECE4D4" stroke-width="' + stroke + '"/>';
    } else {
      segments.forEach(function (s) {
        var frac = s.amount / total;
        var len = frac * c;
        parts += '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="' + s.color +
          '" stroke-width="' + stroke + '" stroke-dasharray="' + len + ' ' + (c - len) +
          '" stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 ' + cx + ' ' + cx + ')" stroke-linecap="butt"/>';
        offset += len;
      });
    }
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' + parts +
      '<text x="' + cx + '" y="' + (cx - 4) + '" text-anchor="middle" font-family="Fraunces,serif" font-weight="600" font-size="19" fill="#1E231D">' + eurShort(total) + '</text>' +
      '<text x="' + cx + '" y="' + (cx + 13) + '" text-anchor="middle" font-family="Hanken Grotesk,sans-serif" font-size="9.5" fill="#9AA095">este mes</text>' +
      '</svg>';
  }

  // ---------- Render: resumen ----------
  function renderResumen() {
    var me = monthExpenses();
    var content = document.getElementById("content");
    if (me.length === 0) { content.innerHTML = emptyState(); return; }

    var total = sum(me);
    var cats = byCategoryWithItems(me).map(function (x) {
      var c = cat(x.id);
      return { id: x.id, amount: x.amount, items: x.items, color: c.color, label: c.label, emoji: c.emoji };
    });

    var legend = cats.slice(0, 6).map(function (s) {
      return '<div class="row"><span class="dot" style="background:' + s.color + '"></span>' +
        '<span class="nm">' + esc(s.label) + '</span><span class="am">' + eurShort(s.amount) + '</span></div>';
    }).join("");

    var bars = cats.map(function (s) {
      var pct = total > 0 ? (s.amount / total * 100) : 0;
      var isOpen = openCats[s.id] ? " open" : "";
      var subItems = s.items.map(function (e) {
        return '<div class="catbar-item" data-id="' + esc(e.id) + '">' +
          '<span class="ci-date">' + shortDate(e.date) + '</span>' +
          '<span class="ci-note">' + esc(e.note || s.label) + '</span>' +
          '<span class="ci-amt">' + eur(e.amount) + '</span>' +
          '<span class="ci-chev">›</span></div>';
      }).join("");
      return '<div class="catbar-wrap' + isOpen + '" data-cat="' + s.id + '">' +
        '<div class="catbar-head">' +
        '<span class="emoji">' + s.emoji + '</span>' +
        '<span class="lbl">' + esc(s.label) + '</span>' +
        '<span class="amt">' + eur(s.amount) + '</span>' +
        '<span class="pct">' + pct.toFixed(0) + '%</span>' +
        '<span class="toggle">›</span></div>' +
        '<div class="catbar-track"><div class="catbar-fill" style="width:' + pct.toFixed(1) + '%;background:' + s.color + '"></div></div>' +
        '<div class="catbar-items"><div class="catbar-list">' + subItems + '</div></div></div>';
    }).join("");

    content.innerHTML =
      '<div class="card"><h3>¿En qué se va?</h3>' +
      '<div class="donut-wrap">' + donutSVG(cats, total) + '<div class="legend">' + legend + '</div></div></div>' +
      '<div class="card"><h3>Desglose por categoría <span style="font-size:11px;font-weight:400;color:var(--faint);font-family:\'Hanken Grotesk\',sans-serif">· toca para ver</span></h3>' + bars + '</div>';
  }

  // ---------- Render: movimientos ----------
  function renderMovimientos() {
    var me = monthExpenses().slice().sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
    var content = document.getElementById("content");
    if (me.length === 0) { content.innerHTML = emptyState(); return; }

    var html = '<div class="edit-hint">✎ Toca un gasto para editarlo o borrarlo</div>', curDay = null;
    me.forEach(function (e) {
      if (e.date !== curDay) {
        if (curDay !== null) html += "</div>";
        curDay = e.date;
        html += '<div class="day-group"><div class="day-label">' + esc(dayLabel(e.date)) + "</div>";
      }
      var c = cat(e.categoryId);
      html += '<div class="item" data-id="' + e.id + '">' +
        '<div class="ico" style="background:' + c.color + '22">' + c.emoji + '</div>' +
        '<div class="mid"><div class="t">' + esc(e.note || c.label) + '</div>' +
        '<div class="s">' + esc(c.label) + '</div></div>' +
        '<div class="amt">' + eur(e.amount) + '</div><div class="chev">›</div></div>';
    });
    if (curDay !== null) html += "</div>";
    content.innerHTML = html;
  }

  function emptyState() {
    return '<div class="card"><div class="empty"><div class="big">🧾</div>' +
      '<p>Aún no hay gastos en ' + monthName(viewMonth) + '.</p>' +
      '<p class="hint">Pulsa <b>Añadir gasto</b> o <b>Escanear ticket</b> para empezar.</p></div></div>';
  }

  function render() {
    renderHeader();
    document.getElementById("tabResumen").classList.toggle("on", view === "resumen");
    document.getElementById("tabMov").classList.toggle("on", view === "movimientos");
    if (view === "resumen") renderResumen(); else renderMovimientos();
  }

  // ---------- Modal ----------
  function catGrid(selected) {
    return CATS.map(function (c) {
      return '<button type="button" class="cat-chip' + (c.id === selected ? " on" : "") + '" data-cat="' + c.id + '">' +
        '<span class="e">' + c.emoji + '</span><span class="nm">' + esc(c.label) + '</span></button>';
    }).join("");
  }

  function openModal(opts) {
    opts = opts || {};
    editingId = opts.id || null;
    formCat = opts.categoryId || "super";
    var amount = opts.amount != null ? String(opts.amount).replace(".", ",") : "";
    var date = opts.date || todayISO();
    var note = opts.note || "";

    var sheet = document.getElementById("sheet");
    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>' + (editingId ? "Editar gasto" : "Nuevo gasto") + '</h2>' +
      (opts.statusHTML || "") +
      '<div class="field"><label>Importe</label>' +
      '<div class="amount-input"><span>€</span><input id="fAmount" type="text" inputmode="decimal" placeholder="0,00" value="' + esc(amount) + '"></div>' +
      (opts.amountErr ? '<div class="note-err" style="margin-top:6px">' + esc(opts.amountErr) + "</div>" : "") +
      '</div>' +
      '<div class="field"><label style="display:flex;justify-content:space-between;align-items:center">Categoría <button type="button" class="deduce-btn" id="deduceBtn">🔎 Deducir del concepto</button></label><div class="cat-grid" id="catGrid">' + catGrid(formCat) + '</div></div>' +
      '<div class="field"><label>Concepto (opcional)</label><input id="fNote" class="txt-input" type="text" placeholder="p. ej. Compra Jumbo" value="' + esc(note) + '"></div>' +
      '<div class="field"><label>Fecha</label><input id="fDate" class="date-input" type="date" value="' + esc(date) + '"></div>' +
      '<div class="sheet-actions">' +
      (editingId ? '<button class="btn del-btn" id="delBtn">🗑</button>' : "") +
      '<button class="btn save-btn" id="saveBtn">' + (editingId ? "Guardar cambios" : "Guardar gasto") + '</button>' +
      '</div>';

    document.getElementById("modal").classList.remove("hidden");

    document.getElementById("catGrid").addEventListener("click", function (ev) {
      var b = ev.target.closest(".cat-chip");
      if (!b) return;
      formCat = b.getAttribute("data-cat");
      Array.prototype.forEach.call(this.querySelectorAll(".cat-chip"), function (el) {
        el.classList.toggle("on", el === b);
      });
    });
    document.getElementById("saveBtn").addEventListener("click", saveFromModal);
    var del = document.getElementById("delBtn");
    if (del) del.addEventListener("click", deleteCurrent);
    var deduce = document.getElementById("deduceBtn");
    if (deduce) deduce.addEventListener("click", function () {
      var txt = document.getElementById("fNote").value.trim();
      if (!txt) { toast("Escribe primero el concepto"); document.getElementById("fNote").focus(); return; }
      var btn = this, prev = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-sm"></span> Pensando…';
      classifyFromText(txt, function (id) {
        btn.disabled = false; btn.innerHTML = prev;
        if (!id) { toast("No pude deducirlo"); return; }
        formCat = id;
        var grid = document.getElementById("catGrid");
        if (grid) Array.prototype.forEach.call(grid.querySelectorAll(".cat-chip"), function (el) {
          el.classList.toggle("on", el.getAttribute("data-cat") === id);
        });
        toast("Categoría: " + cat(id).label);
      });
    });
    if (!editingId && opts.categoryId === "sin_clasificar") {
      setTimeout(function () { var n = document.getElementById("fNote"); if (n) n.focus(); }, 250);
    } else if (!editingId && !opts.amount) {
      setTimeout(function () { var a = document.getElementById("fAmount"); if (a) a.focus(); }, 250);
    }
  }

  function closeModal() {
    document.getElementById("modal").classList.add("hidden");
    document.getElementById("sheet").innerHTML = "";
    editingId = null;
  }

  function saveFromModal() {
    var amt = parseAmount(document.getElementById("fAmount").value);
    if (isNaN(amt) || amt <= 0) {
      var f = document.getElementById("fAmount");
      f.focus();
      if (!document.getElementById("amtErr")) {
        var e = document.createElement("div");
        e.className = "note-err"; e.id = "amtErr"; e.style.marginTop = "6px";
        e.textContent = "Pon un importe válido.";
        f.closest(".field").appendChild(e);
      }
      return;
    }
    var note = document.getElementById("fNote").value.trim();
    var date = document.getElementById("fDate").value || todayISO();

    if (editingId) {
      var ex = expenses.find(function (x) { return x.id === editingId; });
      if (ex) { ex.amount = amt; ex.categoryId = formCat; ex.note = note; ex.date = date; }
      toast("Gasto actualizado ✓");
    } else {
      expenses.push({ id: uid(), amount: amt, categoryId: formCat, note: note, date: date, createdAt: Date.now() });
      toast("Gasto guardado ✓");
    }
    // jump view to the month of the saved expense
    var d = new Date(date + "T00:00:00");
    viewYear = d.getFullYear(); viewMonth = d.getMonth();
    saveData();
    closeModal();
    render();
  }

  function deleteCurrent() {
    if (!editingId) return;
    expenses = expenses.filter(function (x) { return x.id !== editingId; });
    saveData();
    closeModal();
    render();
    toast("Gasto eliminado");
  }

  // ---------- Scan ticket via API ----------
  function fileToBase64(file) {
    return new Promise(function (resolve, reject) {
      var r = new FileReader();
      r.onload = function () {
        var res = String(r.result);
        var comma = res.indexOf(",");
        resolve(comma > -1 ? res.slice(comma + 1) : res);
      };
      r.onerror = function () { reject(new Error("No se pudo leer la imagen")); };
      r.readAsDataURL(file);
    });
  }

  function scanPrompt() {
    var ids = CATS.filter(function (c) { return c.id !== "sin_clasificar"; })
      .map(function (c) { return c.id + " (" + c.label + ")"; }).join(", ");
    return "Eres un asistente que registra gastos personales. La imagen puede ser: (a) un ticket o recibo de compra, o (b) una captura de la app del banco con uno o varios movimientos. " +
      "Extrae SOLO los gastos (cargos, compras, pagos, salidas de dinero). Ignora ingresos, abonos, nóminas, devoluciones y transferencias recibidas. " +
      "Devuelve ÚNICAMENTE JSON válido, sin markdown ni texto extra, con esta forma exacta: " +
      '{"movimientos":[{"importe": number, "fecha": "YYYY-MM-DD" | null, "concepto": "texto" | null, "categoria": "id" | null, "seguro": true | false}]}. ' +
      "Reglas: importe siempre POSITIVO, número con punto decimal (ej. 12.45). " +
      "fecha en formato YYYY-MM-DD si aparece, si no null. " +
      "concepto = nombre del comercio o descripción del movimiento tal como aparece. " +
      "categoria = el id que MEJOR encaje de esta lista: " + ids + ". " +
      "El usuario vive en Aalsmeer (Países Bajos) y a veces gasta en Valencia (España). " +
      "Si en un movimiento del banco aparece el nombre de un comercio o establecimiento que no reconoces (códigos tipo 'CCV*...', 'SUMUP*...', 'PAYPAL*...', nombres de tiendas o bares), USA la herramienta de búsqueda web para averiguar qué tipo de negocio es y dónde está, y así clasificarlo correctamente. " +
      'Pon "seguro": true SOLO si estás razonablemente seguro de la categoría (tras buscar si hace falta). ' +
      'Si entiendes el gasto pero no encaja en ninguna categoría, usa "otros". ' +
      'Si NO logras saber de qué es el gasto ni siquiera tras buscar (concepto críptico, ilegible o ambiguo), usa "categoria": null y "seguro": false. No inventes. ' +
      "Si un ticket tiene un único total, devuelve un solo movimiento con ese total. " +
      'Si no hay ningún gasto, devuelve {"movimientos":[]}. ' +
      "IMPORTANTE: tu salida final debe ser ÚNICAMENTE el objeto JSON, sin ningún texto antes ni después.";
  }

  function callVisionAPI(file) {
    return fileToBase64(file).then(function (b64) {
      var mt = file.type && file.type.indexOf("image/") === 0 ? file.type : "image/jpeg";
      return fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mt, data: b64 } },
              { type: "text", text: scanPrompt() }
            ]
          }]
        })
      });
    }).then(function (res) { return res.json(); });
  }

  function extractJsonObject(text) {
    if (!text) return "{}";
    var key = text.indexOf('"movimientos"');
    if (key > -1) {
      var start = text.lastIndexOf("{", key);
      var end = text.lastIndexOf("}");
      if (start > -1 && end > start) return text.slice(start, end + 1);
    }
    var m = text.match(/\{[\s\S]*\}/);
    return m ? m[0] : "{}";
  }

  function mapMovement(m) {
    var amt = (typeof m.importe === "number") ? m.importe : parseAmount(m.importe);
    amt = Math.abs(amt);
    var clear = m.categoria && CAT_MAP[m.categoria] && m.categoria !== "sin_clasificar" && m.seguro === true;
    return {
      amount: amt,
      date: m.fecha || todayISO(),
      note: m.concepto || "",
      categoryId: clear ? m.categoria : "sin_clasificar"
    };
  }

  function handleScan(file) {
    if (!file) return;
    openModal({ statusHTML: '<div class="scan-status"><div class="spinner"></div><div>Analizando la imagen y buscando los establecimientos… puede tardar unos segundos.</div></div>', date: todayISO() });
    callVisionAPI(file).then(function (data) {
      if (!data || data.error || !data.content) throw new Error("respuesta vacía");
      var text = data.content.map(function (b) { return b.type === "text" ? b.text : ""; }).join("\n");
      var clean = text.replace(/```json/g, "").replace(/```/g, "").trim();
      var parsed = JSON.parse(extractJsonObject(clean));
      var list = (parsed.movimientos || []).map(mapMovement).filter(function (x) { return x.amount > 0; });

      if (list.length === 0) {
        openModal({ date: todayISO(), statusHTML: '<div class="scan-status"><div>No detecté ningún gasto en la imagen. Rellénalo a mano.</div></div>' });
      } else if (list.length === 1) {
        var x = list[0];
        var dup = isDuplicate(x);
        var unclear = x.categoryId === "sin_clasificar";
        var statusHTML = dup
          ? '<div class="scan-status" style="background:#FFF8E1;color:#7A5C00"><div>⚠ Este gasto parece que ya está guardado (misma fecha e importe). Revísalo antes de guardar.</div></div>'
          : (unclear
              ? '<div class="scan-status"><div>Leí el importe, pero no tengo claro de qué es. Escribe el concepto y pulsa "Deducir", o elige la categoría.</div></div>'
              : '<div class="scan-status" style="background:#E2EDE6;color:#14543C"><div>✓ Leído y clasificado. Revisa y guarda.</div></div>');
        openModal({ amount: x.amount, date: x.date, note: x.note, categoryId: x.categoryId, statusHTML: statusHTML });
      } else {
        openMultiReview(list);
      }
    }).catch(function (err) {
      console.error("scan error", err);
      openModal({ date: todayISO(), statusHTML: '<div class="scan-status"><div>No pude leer la imagen automáticamente. Rellénalo a mano.</div></div>' });
    });
  }

  // ---------- Anti-duplicados ----------
  function isDuplicate(candidate) {
    var matchCount = expenses.filter(function (e) {
      return e.date === candidate.date && Math.abs(e.amount - candidate.amount) < 0.02;
    }).length;
    if (matchCount === 0) return false;
    // Si ya hay tantas instancias como las que hay en el candidato, es duplicado
    return true;
  }

  // ---------- Multi-movement review ----------
  function catOptions(selected) {
    return CATS.map(function (c) {
      return '<option value="' + c.id + '"' + (c.id === selected ? " selected" : "") + '>' + c.emoji + " " + esc(c.label) + '</option>';
    }).join("");
  }

  function openMultiReview(list) {
    editingId = null;
    var newItems = [], dupItems = [];
    list.forEach(function (x) {
      if (isDuplicate(x)) dupItems.push(x); else newItems.push(x);
    });
    var nUnclear = newItems.filter(function (x) { return x.categoryId === "sin_clasificar"; }).length;

    function buildRow(x, i, isDup) {
      var unclear = !isDup && x.categoryId === "sin_clasificar";
      var cls = isDup ? " dup" : (unclear ? " unclear" : "");
      return '<div class="rev-row' + cls + '" data-i="' + i + '" data-dup="' + (isDup ? "1" : "0") + '">' +
        (isDup
          ? '<div class="dup-badge">✓ ya guardado</div>'
          : (unclear ? '<div class="rev-flag">⚠ No sé de qué es — corrígelo</div>' : '')) +
        (!isDup ? '<button class="rev-del" data-del="' + i + '">×</button>' : '') +
        '<div class="rev-top">' +
        '<input class="rev-concept" data-f="note" placeholder="¿De qué es?" value="' + esc(x.note) + '"' + (isDup ? ' readonly' : '') + '>' +
        '<input class="rev-amt" data-f="amount" inputmode="decimal" value="' + String(x.amount).replace(".", ",") + '"' + (isDup ? ' readonly' : '') + '>' +
        '</div>' +
        '<div class="rev-line2">' +
        '<select data-f="cat"' + (isDup ? ' disabled' : '') + '>' + catOptions(x.categoryId) + '</select>' +
        '<input class="rev-date" data-f="date" type="date" value="' + esc(x.date) + '"' + (isDup ? ' readonly' : '') + '>' +
        '</div>' +
        (isDup ? '<button class="force-add-btn" data-force="1">Añadir igualmente</button>' : '') +
        '</div>';
    }

    var newRows = newItems.map(function (x, i) { return buildRow(x, i, false); }).join("");
    var dupRows = dupItems.map(function (x, i) { return buildRow(x, newItems.length + i, true); }).join("");
    var dupSection = dupItems.length > 0
      ? '<div class="dup-section-head"><span>' + dupItems.length + ' ya guardado' + (dupItems.length > 1 ? 's' : '') + ' (omitidos)</span>' +
        '<button class="dup-toggle" id="dupToggle">Ver ▾</button></div>' +
        '<div id="dupList" style="display:none">' + dupRows + '</div>'
      : '';

    var countMsg = newItems.length > 0
      ? 'Detecté <b>' + newItems.length + '</b> nuevo' + (newItems.length !== 1 ? 's' : '')
      : 'Todos los movimientos ya están guardados';
    if (nUnclear) countMsg += ' · <span style="color:var(--accent)">' + nUnclear + ' sin clasificar</span>';

    var sheet = document.getElementById("sheet");
    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>Revisar movimientos</h2>' +
      '<div class="rev-count">' + countMsg + '</div>' +
      '<div id="revList">' + newRows + '</div>' +
      dupSection +
      '<div class="sheet-actions">' +
      (newItems.length > 0
        ? '<button class="btn save-btn" id="addAllBtn">Añadir ' + newItems.length + ' nuevo' + (newItems.length !== 1 ? 's' : '') + '</button>'
        : '<button class="btn btn-ghost" id="addAllBtn" style="flex:1" onclick="closeModal()">Cerrar</button>') +
      '</div>';

    document.getElementById("modal").classList.remove("hidden");

    document.getElementById("revList").addEventListener("click", function (ev) {
      var d = ev.target.closest("[data-del]");
      if (!d) return;
      var row = d.closest(".rev-row");
      if (row) row.parentNode.removeChild(row);
      var remaining = document.querySelectorAll("#revList .rev-row").length;
      if (remaining === 0 && dupItems.length === 0) { closeModal(); return; }
      var btn = document.getElementById("addAllBtn");
      if (btn && remaining > 0) btn.textContent = "Añadir " + remaining + " nuevo" + (remaining !== 1 ? "s" : "");
      else if (btn && remaining === 0) { btn.textContent = "Cerrar"; btn.onclick = closeModal; }
    });

    var dupToggle = document.getElementById("dupToggle");
    if (dupToggle) dupToggle.addEventListener("click", function () {
      var dl = document.getElementById("dupList");
      var open = dl.style.display !== "none";
      dl.style.display = open ? "none" : "block";
      this.textContent = open ? "Ver ▾" : "Ocultar ▴";
    });

    // Force-add desde duplicados
    var dupList = document.getElementById("dupList");
    if (dupList) dupList.addEventListener("click", function (ev) {
      var fb = ev.target.closest("[data-force]");
      if (!fb) return;
      var row = fb.closest(".rev-row");
      if (!row) return;
      row.classList.remove("dup");
      row.removeAttribute("data-dup");
      Array.prototype.forEach.call(row.querySelectorAll("input,select"), function (el) {
        el.removeAttribute("readonly"); el.removeAttribute("disabled");
      });
      fb.parentNode.removeChild(fb);
      document.getElementById("revList").appendChild(row);
      var btn = document.getElementById("addAllBtn");
      var n = document.querySelectorAll("#revList .rev-row").length;
      if (btn) btn.textContent = "Añadir " + n + " nuevo" + (n !== 1 ? "s" : "");
    });

    if (newItems.length > 0) document.getElementById("addAllBtn").addEventListener("click", addAllFromReview);
  }

  function addAllFromReview() {
    var rows = document.querySelectorAll("#revList .rev-row");
    var added = 0, lastDate = todayISO();
    Array.prototype.forEach.call(rows, function (row) {
      if (row.getAttribute("data-dup") === "1") return; // skip duplicados no forzados
      var amt = parseAmount(row.querySelector('[data-f="amount"]').value);
      if (isNaN(amt) || amt <= 0) return;
      var dt = row.querySelector('[data-f="date"]').value || todayISO();
      lastDate = dt;
      expenses.push({
        id: uid(), amount: amt,
        categoryId: row.querySelector('[data-f="cat"]').value,
        note: row.querySelector('[data-f="note"]').value.trim(),
        date: dt, createdAt: Date.now()
      });
      added++;
    });
    if (added === 0) { toast("Revisa los importes"); return; }
    var d = new Date(lastDate + "T00:00:00");
    viewYear = d.getFullYear(); viewMonth = d.getMonth();
    saveData(); closeModal(); render();
    toast(added + (added > 1 ? " gastos añadidos ✓" : " gasto añadido ✓"));
  }

  // ---------- Classify from text ----------
  function classifyFromText(text, onDone) {
    var ids = CATS.filter(function (c) { return c.id !== "sin_clasificar"; }).map(function (c) { return c.id + " (" + c.label + ")"; }).join(", ");
    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1024,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: 'Clasifica este gasto en una categoría. Concepto: "' + text + '". El usuario vive en Aalsmeer (Países Bajos). Si el concepto es un nombre de comercio o establecimiento que no reconoces, busca en la web qué tipo de negocio es. Categorías (id y significado): ' + ids + '. Tu última palabra debe ser SOLO el id que mejor encaje. Si no encaja en ninguna, responde otros.' }]
      })
    }).then(function (r) { return r.json(); }).then(function (data) {
      var t = (data.content || []).map(function (b) { return b.type === "text" ? b.text : ""; }).join(" ").toLowerCase();
      var tokens = t.split(/[^a-z_]+/).filter(Boolean);
      var found = "otros";
      for (var i = tokens.length - 1; i >= 0; i--) { if (CAT_MAP[tokens[i]] && tokens[i] !== "sin_clasificar") { found = tokens[i]; break; } }
      onDone(found);
    }).catch(function () { onDone(null); });
  }

  // ---------- Paste movements (from chat) ----------
  function parsePasted(text) {
    var out = [];
    text.split(/\r?\n/).forEach(function (line) {
      line = line.trim();
      if (!line || /^fecha\b/i.test(line)) return;
      var parts = line.split(/[;\t|]/).map(function (s) { return s.trim(); });
      var date = null, catId = null, amount = NaN, note = "";
      if (parts.length >= 4) {
        date = parts[0]; catId = parts[1]; amount = parseAmount(parts[2]); note = parts.slice(3).join(" ");
      } else if (parts.length === 3) {
        if (/\d{4}-\d{2}-\d{2}/.test(parts[0])) { date = parts[0]; amount = parseAmount(parts[1]); note = parts[2]; }
        else { catId = parts[0]; amount = parseAmount(parts[1]); note = parts[2]; }
      } else if (parts.length === 2) {
        amount = parseAmount(parts[0]); note = parts[1];
      }
      if (isNaN(amount) || amount <= 0) {
        for (var i = 0; i < parts.length; i++) { var a = parseAmount(parts[i]); if (!isNaN(a) && a > 0) { amount = a; break; } }
      }
      if (isNaN(amount) || amount <= 0) return;
      out.push({
        amount: Math.abs(amount),
        date: (date && /\d{4}-\d{2}-\d{2}/.test(date)) ? date : todayISO(),
        note: note || "",
        categoryId: (catId && CAT_MAP[catId]) ? catId : "sin_clasificar"
      });
    });
    return out;
  }

  function openPasteSheet() {
    editingId = null;
    var sheet = document.getElementById("sheet");
    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>Pegar movimientos</h2>' +
      '<div class="cat-hint">Pega aquí el listado que te paso en el chat (un gasto por línea) y pulsa Procesar. Podrás revisar todo antes de guardar.</div>' +
      '<textarea id="pasteArea" class="txt-input" style="min-height:150px;font-family:monospace;font-size:12.5px;resize:vertical" placeholder="2026-06-04;super;23,40;Albert Heijn&#10;2026-06-03;comer;12,50;Bar Lola"></textarea>' +
      '<div id="pasteErr" class="note-err" style="margin-top:8px;display:none">No reconocí ningún gasto. Revisa el texto.</div>' +
      '<div class="sheet-actions"><button class="btn save-btn" id="procPaste">Procesar</button></div>';
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("procPaste").addEventListener("click", function () {
      var txt = document.getElementById("pasteArea").value;
      var list = parsePasted(txt);
      if (list.length === 0) { document.getElementById("pasteErr").style.display = "block"; return; }
      if (list.length === 1) {
        var x = list[0];
        openModal({ amount: x.amount, date: x.date, note: x.note, categoryId: x.categoryId,
          statusHTML: '<div class="scan-status" style="background:#E2EDE6;color:#14543C"><div>✓ Revisa y guarda.</div></div>' });
      } else {
        openMultiReview(list);
      }
    });
    setTimeout(function () { var a = document.getElementById("pasteArea"); if (a) a.focus(); }, 250);
  }

  // ---------- CSV export ----------
  function exportCSV() {
    if (expenses.length === 0) { toast("No hay nada que exportar"); return; }
    var rows = [["Fecha", "Categoria", "Tipo", "Concepto", "Importe_EUR"]];
    expenses.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; }).forEach(function (e) {
      var c = cat(e.categoryId);
      rows.push([e.date, c.label, c.type, (e.note || "").replace(/"/g, "'"), String(e.amount).replace(".", ",")]);
    });
    var csv = rows.map(function (r) {
      return r.map(function (cell) { return '"' + cell + '"'; }).join(";");
    }).join("\n");
    var blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "gastos_" + todayISO() + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast("CSV descargado ✓");
  }

  // ---------- Toast ----------
  var toastTimer = null;
  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2200);
  }

  // ---------- Events ----------
  function wire() {
    document.getElementById("prevMonth").addEventListener("click", function () {
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render();
    });
    document.getElementById("nextMonth").addEventListener("click", function () {
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render();
    });
    document.getElementById("tabResumen").addEventListener("click", function () { view = "resumen"; render(); });
    document.getElementById("tabMov").addEventListener("click", function () { view = "movimientos"; render(); });
    document.getElementById("addBtn").addEventListener("click", function () { openModal({}); });
    document.getElementById("pasteBtn").addEventListener("click", openPasteSheet);
    document.getElementById("scanInput").addEventListener("change", function (ev) {
      var f = ev.target.files && ev.target.files[0];
      this.value = "";
      handleScan(f);
    });
    document.getElementById("scrim").addEventListener("click", closeModal);
    document.getElementById("exportBtn").addEventListener("click", exportCSV);
    document.getElementById("exportBtn2").addEventListener("click", exportCSV);

    document.getElementById("content").addEventListener("click", function (ev) {
      // Expandir/colapsar categoría
      var head = ev.target.closest(".catbar-head");
      if (head) {
        var wrap = head.closest(".catbar-wrap");
        if (wrap) {
          var cid = wrap.getAttribute("data-cat");
          openCats[cid] = !openCats[cid];
          wrap.classList.toggle("open", !!openCats[cid]);
        }
        return;
      }
      // Editar desde el detalle de categoría
      var ci = ev.target.closest(".catbar-item");
      if (ci) {
        var id = ci.getAttribute("data-id");
        var e = expenses.find(function (x) { return x.id === id; });
        if (e) openModal({ id: e.id, amount: e.amount, categoryId: e.categoryId, note: e.note, date: e.date });
        return;
      }
      // Editar desde la lista de movimientos
      var it = ev.target.closest(".item");
      if (!it) return;
      var id2 = it.getAttribute("data-id");
      var e2 = expenses.find(function (x) { return x.id === id2; });
      if (e2) openModal({ id: e2.id, amount: e2.amount, categoryId: e2.categoryId, note: e2.note, date: e2.date });
    });
  }

  // ---------- Init ----------
  wire();

  loadData().then(function () { render(); });
})();
</script>
