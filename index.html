<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mis Gastos">
  <meta name="description" content="Control de gastos personales">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Mis Gastos</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #FFFFFF;
  --bg2: #F3F4F6;
  --surface: #FFFFFF;
  --ink: #111827;
  --muted: #6B7280;
  --faint: #9CA3AF;
  --line: #E5E7EB;
  --primary: #4F46E5;
  --primary-d: #4338CA;
  --primary-soft: #EEF2FF;
  --accent: #4F46E5;
  --accent-soft: #EEF2FF;
  --income: #16A34A;
  --income-soft: #DCFCE7;
  --expense: #DC2626;
  --expense-soft: #FEE2E2;
  --danger: #DC2626;
  --radius: 20px;
  --radius-sm: 14px;
  --shadow: 0 4px 20px rgba(0,0,0,.07);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.05);
}

body { background: #FFFFFF; }

#app {
  font-family: 'Hanken Grotesk', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background: #FFFFFF;
  padding: 18px 14px 0;
}

.phone {
  width: 100%;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  padding-bottom: 96px;
}

/* ---------- Header ---------- */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand .mark {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(150deg, var(--primary), var(--primary-d));
  display: grid; place-items: center; color: #fff; font-size: 19px;
  box-shadow: var(--shadow-sm);
}
.brand h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; letter-spacing: -.01em; }
.brand p { font-size: 11.5px; color: var(--muted); margin-top: -1px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--line);
  background: var(--surface); color: var(--ink); font-size: 16px; cursor: pointer;
  display: grid; place-items: center; transition: .15s;
}
.icon-btn:active { transform: scale(.94); }

/* ---------- Hero card ---------- */
.hero {
  background: #FFFFFF;
  border: 1.5px solid #E5E7EB;
  border-top: 4px solid #4F46E5;
  border-radius: var(--radius);
  padding: 20px 22px 18px;
  color: #111827;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.hero::after { content: none; }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.month-nav .label { font-size: 13.5px; font-weight: 600; letter-spacing: .01em; text-transform: capitalize; color: #111827; }
.month-nav button {
  width: 30px; height: 30px; border-radius: 9px; border: 1.5px solid #E5E7EB; cursor: pointer;
  background: #F9FAFB; color: #374151; font-size: 15px; display: grid; place-items: center;
  transition: .15s; position: relative; z-index: 1; user-select: none; -webkit-user-select: none;
}
.month-nav button:active { transform: scale(.9); background: #E5E7EB; }
.hero .total-lbl { font-size: 11px; color: #6B7280; letter-spacing: .06em; text-transform: uppercase; font-weight: 600; }
.hero .total {
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 44px; line-height: 1.05;
  margin-top: 3px; font-variant-numeric: tabular-nums; letter-spacing: -.02em; color: #111827;
}
.hero .split { display: flex; gap: 10px; margin-top: 16px; }
.hero .split .pill { flex: 1; border-radius: 12px; padding: 10px 13px; }
.hero .split .pill:nth-child(1) { background: #DCFCE7; border: 1px solid #BBF7D0; }
.hero .split .pill:nth-child(2) { background: #FEE2E2; border: 1px solid #FECACA; }
.hero .split .pill:nth-child(3) { background: #F3F4F6; border: 1px solid #E5E7EB; }
.hero .split .pill .k { font-size: 10px; letter-spacing: .04em; text-transform: uppercase; font-weight: 700; }
.hero .split .pill:nth-child(1) .k { color: #15803D; }
.hero .split .pill:nth-child(2) .k { color: #B91C1C; }
.hero .split .pill:nth-child(3) .k { color: #6B7280; }
.hero .split .pill .v { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
.hero .split .pill:nth-child(1) .v { color: #16A34A; }
.hero .split .pill:nth-child(2) .v { color: #DC2626; }
.hero .split .pill:nth-child(3) .v { color: #374151; }

/* ---------- Actions ---------- */
.actions { display: flex; gap: 10px; margin: 14px 0 4px; }
.btn {
  flex: 1; border: none; border-radius: var(--radius-sm); padding: 14px 12px; cursor: pointer;
  font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 14.5px;
  display: flex; align-items: center; justify-content: center; gap: 8px; transition: .15s;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: #4F46E5; color: #fff; box-shadow: 0 4px 14px rgba(79,70,229,.30); }
.btn-ghost { background: #FFFFFF; color: #111827; border: 1.5px solid #E5E7EB; }
.btn .ic { font-size: 16px; }

/* ---------- Tabs ---------- */
.tabs { display: flex; gap: 3px; background: #F3F4F6; border-radius: 13px; padding: 4px; margin: 16px 0 14px; border: 1px solid #E5E7EB; }
.tabs button {
  flex: 1; border: none; background: transparent; padding: 9px 2px; border-radius: 9px; cursor: pointer;
  font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 10.5px; color: #6B7280; transition: .18s; white-space: nowrap;
}
.tabs button.on { background: #FFFFFF; color: #4F46E5; box-shadow: 0 1px 4px rgba(0,0,0,.08); border: 1px solid #E0E7FF; }

/* ---------- Cards / sections ---------- */
.card { background: #FFFFFF; border-radius: var(--radius); border: 1.5px solid #E5E7EB; padding: 18px; margin-bottom: 14px; }
.card h3 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; margin-bottom: 14px; }

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 18px; }
.donut-wrap svg { flex-shrink: 0; }
.donut-center { font-family: 'Fraunces', serif; }
.legend { flex: 1; display: flex; flex-direction: column; gap: 7px; min-width: 0; }
.legend .row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.legend .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend .nm { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.legend .am { font-weight: 600; font-variant-numeric: tabular-nums; }

/* Category bars — expandable */
.catbar-wrap { margin-bottom: 11px; }
.catbar-wrap:last-child { margin-bottom: 0; }
.catbar-head { display: flex; align-items: center; gap: 9px; cursor: pointer; padding: 3px 0; }
.catbar-head .emoji { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.catbar-head .lbl { flex: 1; font-size: 13.5px; font-weight: 500; }
.catbar-head .amt { font-weight: 600; font-size: 13.5px; font-variant-numeric: tabular-nums; }
.catbar-head .pct { font-size: 11px; color: var(--faint); margin-left: 4px; }
.catbar-head .toggle { font-size: 16px; color: var(--faint); margin-left: 4px; transition: transform .25s; line-height: 1; }
.catbar-wrap.open .toggle { transform: rotate(90deg); }
.catbar-track { height: 7px; background: var(--bg2); border-radius: 6px; overflow: hidden; margin: 7px 0 0; }
.catbar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
.catbar-items { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
.catbar-wrap.open .catbar-items { max-height: 1000px; }
.catbar-list { margin-top: 8px; border-top: 1px solid var(--line); }
.catbar-item { display: flex; align-items: center; gap: 8px; padding: 9px 4px 9px 32px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s; border-radius: 6px; }
.catbar-item:last-child { border-bottom: none; }
.catbar-item:active { background: var(--bg2); }
.catbar-item .ci-date { font-size: 11px; color: var(--faint); width: 44px; flex-shrink: 0; }
.catbar-item .ci-note { flex: 1; font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.catbar-item .ci-amt { font-family: 'Fraunces', serif; font-weight: 600; font-size: 13.5px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.catbar-item .ci-chev { color: var(--faint); font-size: 13px; margin-left: 3px; flex-shrink: 0; }

/* Movimientos list */
.day-group { margin-bottom: 16px; }
.day-label { font-size: 11.5px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; margin: 0 4px 8px; }
.item {
  display: flex; align-items: center; gap: 12px; background: #FFFFFF;
  border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
  border: 1.5px solid #E5E7EB; transition: .15s;
}
.item:active { transform: scale(.99); border-color: #C7D2FE; background: #F5F3FF; }
.item .ico { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
.item .mid { flex: 1; min-width: 0; }
.item .mid .t { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item .mid .s { font-size: 12px; color: var(--muted); margin-top: 1px; }
.item .amt { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; font-variant-numeric: tabular-nums; }
.item .chev { color: var(--faint); font-size: 20px; margin-left: 6px; line-height: 1; }
.item .item-del { margin-left: 8px; width: 30px; height: 30px; flex-shrink: 0; border: none; background: var(--expense-soft); color: var(--danger); border-radius: 9px; font-size: 14px; cursor: pointer; display: grid; place-items: center; transition: .12s; }
.item .item-del:active { transform: scale(.88); }
.item .debt-settle { margin-left: 6px; width: 30px; height: 30px; flex-shrink: 0; border: none; background: var(--income-soft); color: var(--income); border-radius: 9px; font-size: 14px; cursor: pointer; display: grid; place-items: center; transition: .12s; }
.item .debt-settle:active { transform: scale(.88); }
.item .debt-del { margin-left: 6px; width: 30px; height: 30px; flex-shrink: 0; border: none; background: var(--expense-soft); color: var(--danger); border-radius: 9px; font-size: 13px; cursor: pointer; display: grid; place-items: center; transition: .12s; }
.item .debt-del:active { transform: scale(.88); }
.item .debt-adjust { margin-left: 6px; width: 30px; height: 30px; flex-shrink: 0; border: none; background: var(--primary-soft); color: var(--primary); border-radius: 9px; font-size: 16px; font-weight: 700; cursor: pointer; display: grid; place-items: center; transition: .12s; }
.item .debt-adjust:active { transform: scale(.88); }
.edit-hint { font-size: 11.5px; color: var(--faint); text-align: center; margin: 0 0 12px; }
.visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

/* Empty state */
.empty { text-align: center; padding: 38px 20px; color: var(--muted); }
.empty .big { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 13.5px; line-height: 1.5; }
.empty .hint { font-size: 12px; color: var(--faint); margin-top: 4px; }

/* footer */
.foot { padding: 6px 0 20px; }
.foot-actions { display: flex; flex-direction: column; gap: 8px; }
.foot-link {
  display: flex; align-items: center; gap: 11px; width: 100%;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm);
  padding: 13px 15px; cursor: pointer; transition: .15s;
  font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 13.5px; color: var(--ink); text-align: left;
}
.foot-link:active { transform: scale(.99); }
.foot-link .ic { font-size: 16px; }
.foot-link span:nth-child(2) { flex: 1; }
.foot-link .ch { color: var(--faint); font-size: 18px; }
.foot-link.danger { color: var(--danger); }

/* ---------- Modal ---------- */
.modal { position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
.modal-close {
  position: fixed; top: 16px; right: 16px; z-index: 95;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1.5px solid #E5E7EB; background: #FFFFFF; color: #111827;
  font-size: 16px; font-weight: 600; cursor: pointer;
  box-shadow: 0 3px 12px rgba(0,0,0,.14);
  display: flex; align-items: center; justify-content: center;
}
.modal-close:active { transform: scale(.92); }
.modal.hidden { display: none; }
.modal .scrim { position: absolute; inset: 0; background: rgba(20,30,22,.42); backdrop-filter: blur(2px); }
.sheet {
  position: relative; width: 100%; max-width: 460px; background: var(--bg);
  border-radius: 26px 26px 0 0; padding: 8px 20px calc(20px + env(safe-area-inset-bottom));
  box-shadow: 0 -10px 40px rgba(0,0,0,.18); max-height: 92vh; overflow-y: auto;
  animation: rise .26s cubic-bezier(.2,.8,.2,1);
}
@keyframes rise { from { transform: translateY(100%); } to { transform: translateY(0); } }
.grab { width: 40px; height: 4px; border-radius: 4px; background: var(--line); margin: 6px auto 14px; }
.sheet h2 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; margin-bottom: 16px; }
.field { margin-bottom: 16px; }
.field > label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: .02em; }
.amount-input { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--line); border-radius: 14px; padding: 4px 16px; }
.amount-input span { font-family: 'Fraunces', serif; font-size: 26px; color: var(--muted); }
.amount-input input { border: none; outline: none; background: none; font-family: 'Fraunces', serif; font-weight: 600; font-size: 30px; width: 100%; padding: 10px 8px; color: var(--ink); font-variant-numeric: tabular-nums; }
.txt-input, .date-input {
  display: block; width: 100%; border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 14px;
  font-family: 'Hanken Grotesk'; font-size: 15px; background: var(--surface); color: var(--ink); outline: none;
}
.btn, .tabs button, .icon-btn, .cat-chip { user-select: none; -webkit-user-select: none; }
.txt-input:focus, .date-input:focus, .amount-input:focus-within { border-color: var(--primary); }
.cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.cat-chip {
  display: flex; align-items: center; gap: 8px; padding: 10px 11px; border-radius: 12px;
  border: 1.5px solid var(--line); background: var(--surface); cursor: pointer; transition: .15s; font-size: 12.5px; font-weight: 500;
  text-align: left;
}
.cat-chip .e { font-size: 16px; }
.cat-chip.on { border-color: var(--primary); background: var(--primary-soft); }
.cat-chip span.nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
.sheet-actions .btn { padding: 15px; }
.save-btn { background: var(--primary); color: #fff; }
.del-btn { background: var(--accent-soft); color: var(--danger); border: 1px solid #F5C9C9; flex: 0 0 54px; }

.scan-status { display: flex; align-items: center; gap: 12px; background: var(--accent-soft); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; font-size: 13.5px; color: #3730A3; }
.spinner { width: 18px; height: 18px; border: 2.5px solid rgba(55,48,163,.25); border-top-color: #3730A3; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.note-err { color: var(--danger); font-size: 12.5px; }

.deduce-btn { background: var(--primary-soft); color: var(--primary); border: none; border-radius: 9px; padding: 7px 11px; font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.deduce-btn:active { transform: scale(.96); }
.deduce-btn:disabled { opacity: .6; }
.spinner-sm { width: 13px; height: 13px; border: 2px solid rgba(79,70,229,.25); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
.cat-hint { background: var(--accent-soft); border-radius: 12px; padding: 11px 13px; font-size: 12.5px; color: #3730A3; line-height: 1.45; margin-bottom: 12px; }

.rev-row { background: var(--surface); border: 1.5px solid var(--line); border-radius: 14px; padding: 12px; margin-bottom: 10px; position: relative; }
.rev-row.unclear { border-color: var(--accent); background: #FFFBF6; }
.rev-row.dup { opacity: .55; border-color: var(--line); background: var(--bg2); }
.rev-row.dup input, .rev-row.dup select { background: var(--bg2) !important; color: var(--muted); }
.dup-badge { display: inline-block; font-size: 10.5px; font-weight: 700; color: var(--muted); background: var(--line); border-radius: 6px; padding: 2px 8px; margin-bottom: 6px; letter-spacing: .02em; }
.dup-section-head { font-size: 12px; color: var(--muted); margin: 14px 0 8px; padding-top: 12px; border-top: 1px dashed var(--line); display: flex; align-items: center; justify-content: space-between; }
.dup-toggle { background: none; border: none; color: var(--primary); font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 12px; cursor: pointer; padding: 0; }
.force-add-btn { background: none; border: 1px solid var(--line); border-radius: 8px; padding: 4px 10px; font-size: 11.5px; font-family: 'Hanken Grotesk'; font-weight: 600; color: var(--muted); cursor: pointer; margin-top: 6px; }
.rev-row .rev-top { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.rev-row .rev-concept { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: 'Hanken Grotesk'; font-size: 13.5px; outline: none; background: var(--bg); }
.rev-row .rev-amt { width: 92px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 13.5px; outline: none; text-align: right; background: var(--bg); }
.rev-row .rev-line2 { display: flex; gap: 8px; align-items: center; }
.rev-row select { flex: 1; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; font-family: 'Hanken Grotesk'; font-size: 13px; background: var(--bg); outline: none; -webkit-appearance: none; appearance: none; }
.rev-row .rev-date { width: 130px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 8px; font-family: 'Hanken Grotesk'; font-size: 12.5px; background: var(--bg); outline: none; }
.rev-row .rev-del { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--danger); color: #fff; font-size: 13px; cursor: pointer; box-shadow: var(--shadow-sm); }
.rev-flag { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
.rev-count { font-size: 12.5px; color: var(--muted); margin-bottom: 12px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 12px; font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none; transition: .25s; z-index: 80;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===================================================================
   VERSIÓN ORDENADOR — solo se activa en pantallas anchas (920px o más).
   El móvil y la app instalada NO cambian: siguen viéndose igual.
   =================================================================== */
@media (min-width: 920px) {

  #app { align-items: flex-start; padding: 44px 40px; }

  .phone {
    max-width: 1120px;
    display: grid;
    grid-template-columns: 360px minmax(0, 1fr);
    grid-template-areas:
      "brand   tabs"
      "hero    content"
      "actions content"
      "foot    content";
    grid-template-rows: auto auto auto 1fr;
    column-gap: 34px;
    align-items: start;
    padding-bottom: 44px;
  }

  .topbar  { grid-area: brand;   margin-bottom: 20px; }
  .hero    { grid-area: hero;    margin-bottom: 16px; padding: 26px 26px 22px; }
  .actions { grid-area: actions; margin: 0 0 16px; flex-direction: column; }
  .tabs    { grid-area: tabs;    margin: 0 0 18px; max-width: 320px; }
  #content { grid-area: content; }
  .foot    { grid-area: foot;    text-align: left; padding: 4px 0 0; }

  .hero .total { font-size: 50px; }
  .hero .split { flex-direction: column; gap: 8px; margin-top: 18px; }
  .hero .split .pill { display: flex; align-items: center; justify-content: space-between; }
  .hero .split .pill .v { font-size: 18px; }

  .foot button { margin: 0 !important; }

  #content .donut-wrap { gap: 30px; }
  #content .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 26px; }

  .modal { align-items: center; }
  .sheet { border-radius: 22px; max-width: 460px; max-height: 86vh; animation: pop .18s ease; }
}
@keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
/* ---------- Login screen ---------- */
#loginScreen {
  position: fixed; inset: 0; z-index: 100;
  background: #FFFFFF;
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
#loginScreen.hidden { display: none; }
.login-box {
  width: 100%; max-width: 360px;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 32px 28px 28px;
}
.login-box .mark {
  width: 52px; height: 52px; border-radius: 16px;
  background: linear-gradient(150deg, var(--primary), var(--primary-d));
  display: grid; place-items: center; font-size: 26px;
  box-shadow: var(--shadow-sm); margin: 0 auto 18px;
}
.login-box h2 {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 22px;
  text-align: center; margin-bottom: 6px;
}
.login-box p { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }
.login-err { color: var(--danger); font-size: 12.5px; margin-bottom: 12px; text-align: center; display: none; }
.login-btn {
  width: 100%; border: none; border-radius: var(--radius-sm);
  padding: 15px; background: var(--primary); color: #fff;
  font-family: 'Hanken Grotesk'; font-weight: 700; font-size: 15px;
  cursor: pointer; transition: .15s; margin-top: 6px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-btn:active { transform: scale(.98); }
.login-btn:disabled { opacity: .7; }

/* ---------- Interruptor Gasto/Ingreso ---------- */
.kind-toggle { display: flex; gap: 6px; background: var(--bg2); border-radius: 13px; padding: 4px; margin-bottom: 16px; }
.kind-toggle button {
  flex: 1; border: none; background: transparent; padding: 11px; border-radius: 10px; cursor: pointer;
  font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 13.5px; color: var(--muted); transition: .18s;
}
.kind-toggle button.on-gasto { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
.kind-toggle button.on-ingreso { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }

/* ---------- Calendario ---------- */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; padding-bottom: 6px; }
.cal-cell { aspect-ratio: 1 / 1.35; border-radius: 11px; background: #FFFFFF; border: 1.5px solid #E5E7EB; padding: 6px 4px 5px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: .12s; overflow: hidden; }
.cal-cell.empty { background: transparent; border: none; cursor: default; }
.cal-cell.tiene { background: #FEF2F2; border-color: #FECACA; }
.cal-cell:not(.empty):active { transform: scale(.94); }
.cal-cell .cd { font-size: 13px; font-weight: 700; color: #111827; }
.cal-cell .nums { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; }
.cal-cell .cg { font-size: 13px; font-weight: 800; color: #DC2626; line-height: 1.1; }
.cal-cell .ci { font-size: 12px; font-weight: 800; color: #16A34A; line-height: 1.1; }
.cal-cell.hoy { outline: 2px solid #4F46E5; outline-offset: -2px; background: #EEF2FF; }
.del-month-btn { background: none; border: none; color: #DC2626; font-family: 'Hanken Grotesk'; font-weight: 600; font-size: 12px; cursor: pointer; text-decoration: underline; display: block; margin: 14px auto 0; }
</style>
</head>
<body>
<!-- Pantalla de login — se oculta automáticamente al entrar -->

    </div>

</div>
<div id="app">
  <div class="phone">
    <div class="topbar">
      <div class="brand">
        <div class="mark">🌷</div>
        <div>
          <h1>Mis Gastos</h1>
          <p>Aalsmeer · en euros</p>
        </div>
      </div>
      <div style="display:flex;gap:8px">

    <div class="hero">

        <div class="pill"><div class="k">Gastos</div><div class="v" id="varTotal">0 €</div></div>

    <div class="actions">

    <div class="tabs">

  </div>

</div>
<script>
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
(function () {
  "use strict";

  // ---------- Config ----------
  // ⬇ PON AQUÍ TUS DOS CLAVES DE SUPABASE
  var SUPABASE_URL = "https://zlsuswrmzyecktkiwymi.supabase.co";
  var SUPABASE_KEY = "sb_publishable_qoTvP530FWlfg1xwrdRxHg_oph9AfVf";
  // ⬆ Solo cambia esas dos líneas, no toques nada más

  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { storageKey: "sb-gastos-veronica-auth" }
  });
  var currentUser = null;

  var CATS = [
    { id: "vivienda",      label: "Habitación / Vivienda", emoji: "🏠", color: "#14543C", type: "fija" },
    { id: "suministros",   label: "Suministros y casa",    emoji: "💡", color: "#3A6B5A", type: "fija" },
    { id: "super",         label: "Supermercado",          emoji: "🛒", color: "#D9803B", type: "variable" },
    { id: "comer",         label: "Comer fuera / café",    emoji: "☕", color: "#C2602F", type: "variable" },
    { id: "transporte",    label: "Bici y transporte",     emoji: "🚲", color: "#4E8FA8", type: "fija" },
    { id: "coche",         label: "Coche",                 emoji: "🚗", color: "#6B8FA8", type: "fija" },
    { id: "viajes",        label: "Viajes y traslados",    emoji: "✈️", color: "#5B8FA8", type: "variable" },
    { id: "salud",         label: "Salud y seguro",        emoji: "⚕️", color: "#6F9E78", type: "fija" },
    { id: "telefono",      label: "Teléfono e internet",   emoji: "📱", color: "#5B6C8F", type: "fija" },
    { id: "suscripciones", label: "Suscripciones",         emoji: "📺", color: "#8E7CC3", type: "fija" },
    { id: "ropa",          label: "Ropa y cuidado",        emoji: "👕", color: "#B5838D", type: "variable" },
    { id: "valencia",      label: "Valencia y pareja",     emoji: "❤️", color: "#C9485B", type: "variable" },
    { id: "ocio",          label: "Ocio y salidas",        emoji: "🎉", color: "#E0A93C", type: "variable" },
    { id: "peluqueria",    label: "Peluquería",            emoji: "💈", color: "#9B72CF", type: "variable" },
    { id: "tramites",      label: "Trámites y comisiones", emoji: "📄", color: "#7C8079", type: "variable" },
    { id: "otros",         label: "Otros / imprevistos",   emoji: "✳️", color: "#9AA0A6", type: "variable" },
    { id: "sin_clasificar",label: "Sin clasificar",        emoji: "🔍", color: "#C98A3C", type: "variable" }
  ];
  var CAT_MAP = {};
  CATS.forEach(function (c) { CAT_MAP[c.id] = c; });

  // ---------- State ----------
  var expenses = [];
  var debts = [];
  var view = "resumen";
  var now = new Date();
  var viewYear = now.getFullYear();
  var viewMonth = now.getMonth();
  var editingId = null;
  var formCat = "super";
  var formKind = "gasto";
  var openCats = {};

  // ---------- Helpers ----------
  function pad2(n) { return (n < 10 ? "0" : "") + n; }
  function monthKey(y, m) { return y + "-" + pad2(m + 1); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function eur(n) {
    return new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR" }).format(n || 0);
  }
  function eurShort(n) {
    var v = Math.round(n || 0);
    return new Intl.NumberFormat("es-ES").format(v) + " €";
  }
  function cat(id) { return CAT_MAP[id] || CAT_MAP["otros"]; }
  function todayISO() {
    var d = new Date();
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }
  function monthName(m) {
    return ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"][m];
  }
  function shortDate(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.getDate() + " " + monthName(d.getMonth()).slice(0, 3);
  }
  function byCategoryWithItems(arr) {
    var map = {}, items = {};
    arr.forEach(function (e) {
      map[e.categoryId] = (map[e.categoryId] || 0) + (e.amount || 0);
      if (!items[e.categoryId]) items[e.categoryId] = [];
      items[e.categoryId].push(e);
    });
    return Object.keys(map).map(function (id) {
      return { id: id, amount: map[id], items: (items[id] || []).slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; }) };
    }).sort(function (a, b) { return b.amount - a.amount; });
  }
  function parseAmount(str) {
    if (!str) return NaN;
    var s = String(str).trim().replace(/\s/g, "").replace(/€/g, "");
    if (s.indexOf(",") > -1 && s.indexOf(".") > -1) {
      s = s.replace(/\./g, "").replace(",", ".");
    } else {
      s = s.replace(",", ".");
    }
    return parseFloat(s);
  }
  function dayLabel(iso) {
    var t = todayISO();
    var d = new Date(iso + "T00:00:00");
    var yest = new Date(); yest.setDate(yest.getDate() - 1);
    var yISO = yest.getFullYear() + "-" + pad2(yest.getMonth() + 1) + "-" + pad2(yest.getDate());
    if (iso === t) return "Hoy";
    if (iso === yISO) return "Ayer";
    var s = d.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---------- Auth ----------
  function showLogin() { document.getElementById("loginScreen").classList.remove("hidden"); }
  function hideLogin() { document.getElementById("loginScreen").classList.add("hidden"); }

  function initAuth() {
    var btn = document.getElementById("loginBtn");
    var emailEl = document.getElementById("loginEmail");
    var passEl  = document.getElementById("loginPass");
    var errEl   = document.getElementById("loginErr");

    function doLogin() {
      var email = emailEl.value.trim();
      var pass  = passEl.value;
      if (!email || !pass) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-sm" style="border-color:rgba(255,255,255,.3);border-top-color:#fff"></span> Entrando…';
      errEl.style.display = "none";
      sb.auth.signInWithPassword({ email: email, password: pass })
        .then(function(res) {
          if (res.error) {
            errEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Entrar";
          }
        });
    }

    btn.addEventListener("click", doLogin);
    passEl.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });

    sb.auth.onAuthStateChange(function(event, session) {
      if (session && session.user) {
        currentUser = session.user;
        hideLogin();
        Promise.all([loadData(), loadDebts()]).then(function() { render(); });
      } else {
        currentUser = null;
        expenses = [];
        debts = [];
        showLogin();
      }
    });
  }

  // ---------- Storage (Supabase) ----------
  function loadData() {
    if (!currentUser) return Promise.resolve();
    return sb.from("gastos").select("*").order("date", { ascending: false })
      .then(function(res) {
        if (res.error) { console.error("loadData", res.error); return; }
        expenses = (res.data || []).map(function(r) {
          return { id: r.id, amount: r.amount, categoryId: r.category_id, note: r.note || "", date: r.date, kind: r.kind || "gasto", createdAt: new Date(r.created_at).getTime() };
        });
      });
  }

  function saveExpense(exp) {
    // Convierte del formato interno de la app al formato de Supabase
    var row = { id: exp.id, amount: exp.amount, category_id: exp.categoryId, note: exp.note || "", date: exp.date, kind: exp.kind || "gasto" };
    return sb.from("gastos").upsert(row).then(function(res) {
      if (res.error) { console.error("saveExpense", res.error); toast("Error al guardar 😕"); }
    });
  }

  function deleteExpense(id) {
    return sb.from("gastos").delete().eq("id", id).then(function(res) {
      if (res.error) { console.error("deleteExpense", res.error); toast("Error al borrar 😕"); }
    });
  }

  // Borra TODOS los movimientos del mes que se está viendo (con doble confirmación)
  function deleteMonth() {
    var me = monthExpenses();
    var nombre = monthName(viewMonth) + " " + viewYear;
    if (me.length === 0) { toast("No hay nada que borrar en " + nombre); return; }
    var ok1 = window.confirm("¿Seguro que quieres borrar los " + me.length + " movimientos de " + nombre + "?\n\nEsto no se puede deshacer.");
    if (!ok1) return;
    var ok2 = window.confirm("Última confirmación: se borrarán DEFINITIVAMENTE todos los movimientos de " + nombre + ".");
    if (!ok2) return;
    var ini = monthKey(viewYear, viewMonth) + "-01";
    var fin = monthKey(viewYear, viewMonth) + "-31";
    sb.from("gastos").delete().gte("date", ini).lte("date", fin).then(function(res) {
      if (res.error) { console.error("deleteMonth", res.error); toast("Error al borrar 😕"); return; }
      expenses = expenses.filter(function (e) { return (e.date || "").slice(0, 7) !== monthKey(viewYear, viewMonth); });
      render();
      toast("Borrado " + nombre + " ✓");
    });
  }

  function saveData() { return Promise.resolve(); } // compatibilidad — no se usa directamente

  // ---------- Deudas (Supabase) ----------
  function loadDebts() {
    if (!currentUser) return Promise.resolve();
    return sb.from("deudas").select("*").order("date", { ascending: false })
      .then(function(res) {
        if (res.error) { console.error("loadDebts", res.error); return; }
        debts = (res.data || []).map(function(r) {
          return { id: r.id, persona: r.persona, amount: r.amount, direction: r.direction, note: r.note || "", date: r.date, settled: !!r.settled, createdAt: new Date(r.created_at).getTime() };
        });
      });
  }

  function saveDebt(d) {
    var row = { id: d.id, persona: d.persona, amount: d.amount, direction: d.direction, note: d.note || "", date: d.date, settled: !!d.settled };
    return sb.from("deudas").upsert(row).then(function(res) {
      if (res.error) { console.error("saveDebt", res.error); toast("Error al guardar 😕"); }
    });
  }

  function deleteDebt(id) {
    return sb.from("deudas").delete().eq("id", id).then(function(res) {
      if (res.error) { console.error("deleteDebt", res.error); toast("Error al borrar 😕"); }
    });
  }

  // ---------- Selectors / computations ----------
  function monthExpenses() {
    var key = monthKey(viewYear, viewMonth);
    return expenses.filter(function (e) { return (e.date || "").slice(0, 7) === key; });
  }
  // Solo los GASTOS del mes (lo que sale) — para el donut y el desglose
  function monthGastos() {
    return monthExpenses().filter(function (e) { return e.kind !== "ingreso"; });
  }
  // Solo los INGRESOS del mes (lo que entra)
  function monthIngresos() {
    return monthExpenses().filter(function (e) { return e.kind === "ingreso"; });
  }
  function sum(arr) { return arr.reduce(function (a, e) { return a + (e.amount || 0); }, 0); }
  function byCategory(arr) {
    var map = {};
    arr.forEach(function (e) { map[e.categoryId] = (map[e.categoryId] || 0) + (e.amount || 0); });
    return Object.keys(map).map(function (id) { return { id: id, amount: map[id] }; })
      .sort(function (a, b) { return b.amount - a.amount; });
  }

  // ---------- Render: header ----------
  function renderHeader() {
    var gastos = sum(monthGastos());
    var ingresos = sum(monthIngresos());
    var queda = ingresos - gastos;
    document.getElementById("monthLabel").textContent = monthName(viewMonth) + " " + viewYear;
    document.getElementById("monthTotal").textContent = eur(queda);
    document.getElementById("fixedTotal").textContent = eurShort(ingresos);
    document.getElementById("varTotal").textContent = eurShort(gastos);
    document.getElementById("countTotal").textContent = monthExpenses().length;
    // El "Queda" se pinta en verde si es positivo y en rojo si es negativo
    var totalEl = document.getElementById("monthTotal");
    totalEl.style.color = queda < 0 ? "var(--expense)" : "var(--ink)";
  }

  // ---------- Render: donut ----------
  function donutSVG(segments, total) {
    var size = 116, stroke = 18, r = (size - stroke) / 2, c = 2 * Math.PI * r, cx = size / 2;
    var parts = "", offset = 0;
    if (total <= 0) {
      parts = '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="#E5E7EB" stroke-width="' + stroke + '"/>';
    } else {
      segments.forEach(function (s) {
        var frac = s.amount / total;
        var len = frac * c;
        parts += '<circle cx="' + cx + '" cy="' + cx + '" r="' + r + '" fill="none" stroke="' + s.color +
          '" stroke-width="' + stroke + '" stroke-dasharray="' + len + ' ' + (c - len) +
          '" stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 ' + cx + ' ' + cx + ')" stroke-linecap="butt"/>';
        offset += len;
      });
    }
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' + parts +
      '<text x="' + cx + '" y="' + (cx - 4) + '" text-anchor="middle" font-family="Fraunces,serif" font-weight="600" font-size="19" fill="#1E231D">' + eurShort(total) + '</text>' +
      '<text x="' + cx + '" y="' + (cx + 13) + '" text-anchor="middle" font-family="Hanken Grotesk,sans-serif" font-size="9.5" fill="#9AA095">este mes</text>' +
      '</svg>';
  }

  // ---------- Render: resumen ----------
  function renderResumen() {
    var me = monthGastos();
    var content = document.getElementById("content");
    if (me.length === 0 && monthIngresos().length === 0) { content.innerHTML = emptyState(); return; }
    if (me.length === 0) {
      content.innerHTML = '<div class="card"><div class="empty"><div class="big">💰</div>' +
        '<p>Este mes solo hay ingresos, ningún gasto todavía.</p></div></div>';
      return;
    }

    var total = sum(me);
    var cats = byCategoryWithItems(me).map(function (x) {
      var c = cat(x.id);
      return { id: x.id, amount: x.amount, items: x.items, color: c.color, label: c.label, emoji: c.emoji };
    });

    var legend = cats.slice(0, 6).map(function (s) {
      return '<div class="row"><span class="dot" style="background:' + s.color + '"></span>' +
        '<span class="nm">' + esc(s.label) + '</span><span class="am">' + eurShort(s.amount) + '</span></div>';
    }).join("");

    var bars = cats.map(function (s) {
      var pct = total > 0 ? (s.amount / total * 100) : 0;
      var isOpen = openCats[s.id] ? " open" : "";
      var subItems = s.items.map(function (e) {
        return '<div class="catbar-item" data-id="' + esc(e.id) + '">' +
          '<span class="ci-date">' + shortDate(e.date) + '</span>' +
          '<span class="ci-note">' + esc(e.note || s.label) + '</span>' +
          '<span class="ci-amt">' + eur(e.amount) + '</span>' +
          '<span class="ci-chev">›</span></div>';
      }).join("");
      return '<div class="catbar-wrap' + isOpen + '" data-cat="' + s.id + '">' +
        '<div class="catbar-head">' +
        '<span class="emoji">' + s.emoji + '</span>' +
        '<span class="lbl">' + esc(s.label) + '</span>' +
        '<span class="amt">' + eur(s.amount) + '</span>' +
        '<span class="pct">' + pct.toFixed(0) + '%</span>' +
        '<span class="toggle">›</span></div>' +
        '<div class="catbar-track"><div class="catbar-fill" style="width:' + pct.toFixed(1) + '%;background:' + s.color + '"></div></div>' +
        '<div class="catbar-items"><div class="catbar-list">' + subItems + '</div></div></div>';
    }).join("");

    content.innerHTML =
      '<div class="card"><h3>¿En qué se va?</h3>' +
      '<div class="donut-wrap">' + donutSVG(cats, total) + '<div class="legend">' + legend + '</div></div></div>' +
      '<div class="card"><h3>Desglose por categoría <span style="font-size:11px;font-weight:400;color:var(--faint);font-family:\'Hanken Grotesk\',sans-serif">· toca para ver</span></h3>' + bars + '</div>';
  }

  // ---------- Render: movimientos ----------
  function renderMovimientos() {
    var me = monthExpenses().slice().sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
    var content = document.getElementById("content");
    if (me.length === 0) { content.innerHTML = emptyState(); return; }

    var html = '<div class="edit-hint">✎ Toca para editar · 🗑 para borrar</div>', curDay = null;
    me.forEach(function (e) {
      if (e.date !== curDay) {
        if (curDay !== null) html += "</div>";
        curDay = e.date;
        html += '<div class="day-group"><div class="day-label">' + esc(dayLabel(e.date)) + "</div>";
      }
      var esIngreso = e.kind === "ingreso";
      var c = cat(e.categoryId);
      var ico = esIngreso ? "💰" : c.emoji;
      var icoBg = esIngreso ? "var(--income-soft)" : c.color + "22";
      var sub = esIngreso ? "Ingreso" : c.label;
      var amtTxt = esIngreso ? ("+" + eur(e.amount)) : eur(e.amount);
      var amtColor = esIngreso ? ' style="color:var(--income)"' : '';
      html += '<div class="item" data-id="' + e.id + '">' +
        '<div class="ico" style="background:' + icoBg + '">' + ico + '</div>' +
        '<div class="mid"><div class="t">' + esc(e.note || sub) + '</div>' +
        '<div class="s">' + esc(sub) + '</div></div>' +
        '<div class="amt"' + amtColor + '>' + amtTxt + '</div>' +
        '<button class="item-del" data-del-id="' + e.id + '" aria-label="Borrar">🗑</button></div>';
    });
    if (curDay !== null) html += "</div>";
    content.innerHTML = html;
  }

  // ---------- Render: evolución (España antes / etapa Holanda desde 20 mayo 2026) ----------
  var ETAPA_INICIO = "2026-05-20"; // fecha de llegada a Holanda

  function renderEvolucion() {
    var content = document.getElementById("content");

    // Separar en dos etapas por fecha exacta
    var antes = { ingresos: 0, gastos: 0, n: 0 };
    var meses = {};
    expenses.forEach(function (e) {
      var f = e.date || "";
      if (!f) return;
      if (f < ETAPA_INICIO) {
        if (e.kind === "ingreso") antes.ingresos += (e.amount || 0); else antes.gastos += (e.amount || 0);
        antes.n++;
      } else {
        var mk = f.slice(0, 7);
        if (!meses[mk]) meses[mk] = { ingresos: 0, gastos: 0 };
        if (e.kind === "ingreso") meses[mk].ingresos += (e.amount || 0);
        else meses[mk].gastos += (e.amount || 0);
      }
    });
    var claves = Object.keys(meses).sort();

    if (claves.length === 0 && antes.n === 0) {
      content.innerHTML = '<div class="card"><div class="empty"><div class="big">📊</div>' +
        '<p>Aún no hay movimientos registrados.</p>' +
        '<p class="hint">Cuando metas gastos e ingresos verás aquí la comparación mes a mes.</p></div></div>';
      return;
    }

    function bloqueTotales(titulo, sub, ing, gas) {
      var queda = ing - gas;
      return '<div class="card"><h3>' + titulo + (sub ? ' <span style="font-size:11px;font-weight:400;color:var(--faint);font-family:\'Hanken Grotesk\',sans-serif">· ' + sub + '</span>' : '') + '</h3>' +
        '<div style="display:flex;gap:10px">' +
        '<div style="flex:1;background:var(--income-soft);border-radius:12px;padding:11px 12px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em">Ingresos</div><div style="font-family:\'Fraunces\',serif;font-size:17px;font-weight:600;color:var(--income)">' + eurShort(ing) + '</div></div>' +
        '<div style="flex:1;background:var(--expense-soft);border-radius:12px;padding:11px 12px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em">Gastos</div><div style="font-family:\'Fraunces\',serif;font-size:17px;font-weight:600;color:var(--expense)">' + eurShort(gas) + '</div></div>' +
        '<div style="flex:1;background:var(--bg2);border-radius:12px;padding:11px 12px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em">Queda</div><div style="font-family:\'Fraunces\',serif;font-size:17px;font-weight:600;color:' + (queda < 0 ? "var(--danger)" : "var(--primary)") + '">' + eurShort(queda) + '</div></div>' +
        '</div></div>';
    }

    var maxVal = 0;
    claves.forEach(function (k) { maxVal = Math.max(maxVal, meses[k].ingresos, meses[k].gastos); });
    var totIng = 0, totGas = 0;
    claves.forEach(function (k) { totIng += meses[k].ingresos; totGas += meses[k].gastos; });

    var barras = claves.map(function (k) {
      var m = meses[k];
      var queda = m.ingresos - m.gastos;
      var nombreMes = monthName(parseInt(k.slice(5, 7), 10) - 1);
      var etiqueta = (k === "2026-05") ? nombreMes + " (desde el 20)" : nombreMes;
      var pctIng = maxVal > 0 ? (m.ingresos / maxVal * 100) : 0;
      var pctGas = maxVal > 0 ? (m.gastos / maxVal * 100) : 0;
      return '<div style="margin-bottom:18px">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">' +
        '<span style="font-size:13.5px;font-weight:600;text-transform:capitalize">' + etiqueta + '</span>' +
        '<span style="font-size:13px;font-weight:600;color:' + (queda < 0 ? "var(--danger)" : "var(--primary)") + '">' +
        (queda >= 0 ? "+" : "") + eur(queda) + '</span></div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
        '<span style="font-size:10px;color:var(--muted);width:54px">Ingresos</span>' +
        '<div style="flex:1;height:14px;background:var(--bg2);border-radius:5px;overflow:hidden">' +
        '<div style="height:100%;width:' + pctIng.toFixed(1) + '%;background:var(--income);border-radius:5px"></div></div>' +
        '<span style="font-size:11.5px;font-weight:600;width:64px;text-align:right">' + eurShort(m.ingresos) + '</span></div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
        '<span style="font-size:10px;color:var(--muted);width:54px">Gastos</span>' +
        '<div style="flex:1;height:14px;background:var(--bg2);border-radius:5px;overflow:hidden">' +
        '<div style="height:100%;width:' + pctGas.toFixed(1) + '%;background:var(--expense);border-radius:5px"></div></div>' +
        '<span style="font-size:11.5px;font-weight:600;width:64px;text-align:right">' + eurShort(m.gastos) + '</span></div>' +
        '</div>';
    }).join("");

    var html = "";
    html += bloqueTotales("Mi etapa en Holanda", "desde el 20 de mayo", totIng, totGas);
    if (claves.length > 0) html += '<div class="card"><h3>Mes a mes</h3>' + barras + '</div>';
    // Bloque España (antes de venir), separado y más discreto
    if (antes.n > 0) {
      html += bloqueTotales("Antes de venir", "España, hasta el 19 de mayo · " + antes.n + " mov.", antes.ingresos, antes.gastos);
    }
    content.innerHTML = html;
  }

  // ---------- Render: calendario ----------
  function renderCalendario() {
    var content = document.getElementById("content");
    var me = monthExpenses();
    // Sumar gastos e ingresos por día
    var porDia = {};
    me.forEach(function (e) {
      var d = parseInt((e.date || "").slice(8, 10), 10);
      if (!d) return;
      if (!porDia[d]) porDia[d] = { g: 0, i: 0 };
      if (e.kind === "ingreso") porDia[d].i += (e.amount || 0);
      else porDia[d].g += (e.amount || 0);
    });

    var primerDia = new Date(viewYear, viewMonth, 1).getDay(); // 0=domingo
    var offset = (primerDia === 0) ? 6 : primerDia - 1; // empezar en lunes
    var diasMes = new Date(viewYear, viewMonth + 1, 0).getDate();
    var hoy = todayISO();

    var dows = ["L", "M", "X", "J", "V", "S", "D"];
    var html = '<div class="card"><h3>' + monthName(viewMonth) + " " + viewYear +
      ' <span style="font-size:11px;font-weight:400;color:var(--faint);font-family:\'Hanken Grotesk\',sans-serif">· toca un día</span></h3>' +
      '<div class="cal-grid">';
    dows.forEach(function (d) { html += '<div class="cal-dow">' + d + '</div>'; });
    for (var k = 0; k < offset; k++) html += '<div class="cal-cell empty"></div>';
    for (var dia = 1; dia <= diasMes; dia++) {
      var iso = monthKey(viewYear, viewMonth) + "-" + pad2(dia);
      var dd = porDia[dia];
      var esHoy = iso === hoy ? " hoy" : "";
      var tiene = (dd && dd.g > 0) ? " tiene" : "";
      html += '<div class="cal-cell' + esHoy + tiene + '" data-day="' + iso + '">' +
        '<span class="cd">' + dia + '</span>' +
        '<span class="nums">' +
        (dd && dd.g > 0 ? '<span class="cg">−' + Math.round(dd.g) + '</span>' : '') +
        (dd && dd.i > 0 ? '<span class="ci">+' + Math.round(dd.i) + '</span>' : '') +
        '</span>' +
        '</div>';
    }
    html += '</div>' +
      '<div style="display:flex;gap:14px;justify-content:center;margin-top:14px;font-size:11px;color:var(--muted)">' +
      '<span><span style="color:var(--expense);font-weight:700">−</span> gastos</span>' +
      '<span><span style="color:var(--income);font-weight:700">+</span> ingresos</span></div>' +
      '</div>';
    content.innerHTML = html;
  }

  function openDayDetail(iso) {
    var items = expenses.filter(function (e) { return e.date === iso; })
      .sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
    var sheet = document.getElementById("sheet");
    var d = new Date(iso + "T00:00:00");
    var titulo = d.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
    titulo = titulo.charAt(0).toUpperCase() + titulo.slice(1);
    var gastos = sum(items.filter(function (e) { return e.kind !== "ingreso"; }));
    var ingresos = sum(items.filter(function (e) { return e.kind === "ingreso"; }));

    var filas = items.length === 0
      ? '<div class="empty" style="padding:24px"><p>No hay movimientos este día.</p></div>'
      : items.map(function (e) {
          var esIng = e.kind === "ingreso";
          var c = cat(e.categoryId);
          return '<div class="item" data-id="' + e.id + '">' +
            '<div class="ico" style="background:' + (esIng ? "var(--income-soft)" : c.color + "22") + '">' + (esIng ? "💰" : c.emoji) + '</div>' +
            '<div class="mid"><div class="t">' + esc(e.note || (esIng ? "Ingreso" : c.label)) + '</div>' +
            '<div class="s">' + (esIng ? "Ingreso" : esc(c.label)) + '</div></div>' +
            '<div class="amt"' + (esIng ? ' style="color:var(--income)"' : '') + '>' + (esIng ? "+" : "") + eur(e.amount) + '</div></div>';
        }).join("");

    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>' + esc(titulo) + '</h2>' +
      '<div style="display:flex;gap:10px;margin-bottom:16px">' +
      '<div style="flex:1;background:var(--accent-soft);border-radius:12px;padding:10px 12px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase">Gastos</div><div style="font-family:\'Fraunces\',serif;font-size:16px;font-weight:600;color:var(--accent)">' + eur(gastos) + '</div></div>' +
      '<div style="flex:1;background:var(--primary-soft);border-radius:12px;padding:10px 12px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase">Ingresos</div><div style="font-family:\'Fraunces\',serif;font-size:16px;font-weight:600;color:var(--primary)">' + eur(ingresos) + '</div></div>' +
      '</div>' +
      filas;
    document.getElementById("modal").classList.remove("hidden");
    // Tocar un movimiento del día lo abre para editar
    sheet.addEventListener("click", function (ev) {
      var it = ev.target.closest(".item");
      if (!it) return;
      var e = expenses.find(function (x) { return x.id === it.getAttribute("data-id"); });
      if (e) openModal({ id: e.id, amount: e.amount, categoryId: e.categoryId, note: e.note, date: e.date, kind: e.kind });
    });
  }

  // ---------- Render: deudas ----------
  function renderDeudas() {
    var content = document.getElementById("content");
    var pendientes = debts.filter(function (d) { return !d.settled; });
    var liquidadas = debts.filter(function (d) { return d.settled; });
    var teDeben = pendientes.filter(function (d) { return d.direction === "te_deben"; });
    var debesA = pendientes.filter(function (d) { return d.direction === "debes"; });
    var totalTeDeben = sum(teDeben);
    var totalDebes = sum(debesA);
    var balance = totalTeDeben - totalDebes;

    var addBtnHtml = '<button class="btn btn-primary" id="addDebtBtn" style="width:100%;margin-bottom:14px">+ Añadir deuda</button>';

    if (pendientes.length === 0 && liquidadas.length === 0) {
      content.innerHTML = addBtnHtml +
        '<div class="card"><div class="empty"><div class="big">🤝</div>' +
        '<p>Aún no has registrado ninguna deuda.</p>' +
        '<p class="hint">Apunta aquí lo que te deben y lo que debes, para no perder la cuenta.</p></div></div>';
      attachDeudasEvents();
      return;
    }

    var summary =
      '<div class="card"><h3>Balance de deudas</h3>' +
      '<div style="display:flex;gap:10px">' +
      '<div style="flex:1;background:var(--income-soft);border:1px solid #BBF7D0;border-radius:12px;padding:11px 13px">' +
      '<div style="font-size:10px;color:#15803D;text-transform:uppercase;font-weight:700;letter-spacing:.04em">Te deben</div>' +
      '<div style="font-family:\'Fraunces\',serif;font-size:18px;font-weight:700;color:var(--income)">' + eur(totalTeDeben) + '</div></div>' +
      '<div style="flex:1;background:var(--expense-soft);border:1px solid #FECACA;border-radius:12px;padding:11px 13px">' +
      '<div style="font-size:10px;color:#B91C1C;text-transform:uppercase;font-weight:700;letter-spacing:.04em">Debes</div>' +
      '<div style="font-family:\'Fraunces\',serif;font-size:18px;font-weight:700;color:var(--expense)">' + eur(totalDebes) + '</div></div>' +
      '</div>' +
      '<div style="margin-top:11px;text-align:center;font-size:12.5px;color:var(--muted)">Balance neto: <b style="color:' + (balance >= 0 ? "var(--income)" : "var(--expense)") + '">' + (balance >= 0 ? "+" : "") + eur(balance) + '</b></div>' +
      '</div>';

    function row(d) {
      var esTeDeben = d.direction === "te_deben";
      var icon = esTeDeben ? "📥" : "📤";
      var color = esTeDeben ? "var(--income)" : "var(--expense)";
      var bg = esTeDeben ? "var(--income-soft)" : "var(--expense-soft)";
      return '<div class="item" data-debt-id="' + d.id + '">' +
        '<div class="ico" style="background:' + bg + '">' + icon + '</div>' +
        '<div class="mid"><div class="t">' + esc(d.persona) + '</div>' +
        '<div class="s">' + (d.note ? esc(d.note) + " · " : "") + shortDate(d.date) + '</div></div>' +
        '<div class="amt" style="color:' + color + '">' + eur(d.amount) + '</div>' +
        (d.settled ? '' : '<button class="debt-settle" data-settle-id="' + d.id + '" title="Marcar como pagada">✓</button>') +
        (d.settled ? '' : '<button class="debt-adjust" data-adjust-id="' + d.id + '" title="Actualizar importe">±</button>') +
        '<button class="debt-del" data-del-debt-id="' + d.id + '" title="Borrar">🗑</button>' +
        '</div>';
    }

    var pendHtml = pendientes.length
      ? '<div class="card"><h3>Pendientes</h3>' + pendientes.map(row).join('') + '</div>'
      : '<div class="card"><div class="empty" style="padding:18px"><p>No tienes deudas pendientes. ✓</p></div></div>';

    var liqHtml = '';
    if (liquidadas.length) {
      liqHtml = '<div class="card">' +
        '<div class="dup-section-head"><span>' + liquidadas.length + ' liquidada' + (liquidadas.length > 1 ? 's' : '') + '</span>' +
        '<button class="dup-toggle" id="liqToggle">Ver ▾</button></div>' +
        '<div id="liqList" style="display:none">' + liquidadas.map(row).join('') + '</div>' +
        '</div>';
    }

    content.innerHTML = addBtnHtml + summary + pendHtml + liqHtml;
    attachDeudasEvents();
  }

  // Conecta los eventos propios de la vista Deudas (se reconstruye cada vez que se renderiza)
  function attachDeudasEvents() {
    var addBtn = document.getElementById("addDebtBtn");
    if (addBtn) addBtn.addEventListener("click", function () { openDebtModal({}); });
    var liqToggle = document.getElementById("liqToggle");
    if (liqToggle) liqToggle.addEventListener("click", function () {
      var ll = document.getElementById("liqList");
      var open = ll.style.display !== "none";
      ll.style.display = open ? "none" : "block";
      this.textContent = open ? "Ver ▾" : "Ocultar ▴";
    });
  }

  // ---------- Modal de deuda ----------
  function openDebtModal(opts) {
    opts = opts || {};
    var editingDebtId = opts.id || null;
    var persona = opts.persona || "";
    var amount = opts.amount != null ? String(opts.amount).replace(".", ",") : "";
    var direction = opts.direction || "te_deben";
    var note = opts.note || "";
    var date = opts.date || todayISO();

    var sheet = document.getElementById("sheet");
    sheet.innerHTML =
      '<div class="grab"></div>' +
      '<h2>' + (editingDebtId ? "Editar deuda" : "Nueva deuda") + '</h2>' +
      '<div class="kind-toggle" id="debtDirToggle">' +
      '<button type="button" data-dir="te_deben" class="' + (direction === "te_deben" ? "on-ingreso" : "") + '">📥 Me debe</button>' +
      '<button type="button" data-dir="debes" class="' + (direction === "debes" ? "on-gasto" : "") + '">📤 Le debo</button>' +
      '</div>' +
      '<div class="field"><label>Persona</label><input id="dPersona" class="txt-input" type="text" placeholder="p. ej. David" value="' + esc(persona) + '"></div>' +
      '<div class="field"><label>Importe</label>' +
      '<div class="amount-input"><span>€</span><input id="dAmount" type="text" inputmode="decimal" placeholder="0,00" value="' + esc(amount) + '"></div></div>' +
      '<div class="field"><label>Concepto (opcional)</label><input id="dNote" class="txt-input" type="text" placeholder="p. ej. Cena del sábado" value="' + esc(note) + '"></div>' +
      '<div class="field"><label>Fecha</label><input id="dDate" class="date-input" type="date" value="' + esc(date) + '"></div>' +
      '<div class="sheet-actions">' +
      (editingDebtId ? '<button class="btn del-btn" id="dDelBtn">🗑</button>' : "") +
      '<button class="btn save-btn" id="dSaveBtn">' + (editingDebtId ? "Guardar cambios" : "Guardar deuda") + '</button>' +
      '</div>';

    document.getElementById("modal").classList.remove("hidden");

    document.getElementById("debtDirToggle").addEventListener("click", function (ev) {
      var b = ev.target.closest("[data-dir]");
      if (!b) return;
      direction = b.getAttribute("data-dir");
      this.querySelector('[data-dir="te_deben"]').className = direction === "te_deben" ? "on-ingreso" : "";
      this.querySelector('[data-dir="debes"]').className = direction === "debes" ? "on-gasto" : "";
    });

    document.getElementById("dSaveBtn").addEventListener("click", function () {
      var persona2 = document.getElementById("dPersona").value.trim();
      var amt = parseAmount(document.getElementById("dAmount").value);
      if (!persona2) { toast("Pon el nombre de la persona"); document.getElementById("dPersona").focus(); return; }
      if (isNaN(amt) || amt <= 0) { toast("Pon un importe válido"); document.getElementById("dAmount").focus(); return; }
      var note2 = document.getElementById("dNote").value.trim();
      var date2 = document.getElementById("dDate").value || todayISO();
      var d;
      if (editingDebtId) {
        d = debts.find(function (x) { return x.id === editingDebtId; });
        if (d) { d.persona = persona2; d.amount = amt; d.direction = direction; d.note = note2; d.date = date2; }
      } else {
        d = { id: uid(), persona: persona2, amount: amt, direction: direction, note: note2, date: date2, settled: false, createdAt: Date.now() };
        debts.push(d);
      }
      saveDebt(d).then(function () { toast(editingDebtId ? "Deuda actualizada ✓" : "Deuda guardada ✓"); });
      closeModal();
      render();
    });

    var delBtn = document.getElementById("dDelBtn");
    if (delBtn) delBtn.addEventListener("click", function () {
      debts = debts.filter(function (x) { return x.id !== editingDebtId; });
      deleteDebt(editingDebtId).then(function () { toast("Deuda eliminada"); });
      closeModal();
      render();
    });

    setTimeout(function () { var p = document.getElementById("dPersona"); if (p && !editingDebtId) p.focus(); }, 250);
  }

  // ---------- Ajustar importe de deuda ----------
  function openAdjustDebtModal(deuda) {
    var tipo = "pagar";
    var sheet = document.getElementById("sheet");

      '<div style="font-family:\'Fraunces\',serif;font-size:26px;font-weight:700;color:' + colorDeuda + ';margin-top:3px">' + eur(deuda.amount) + '</div>' +

  // ---------- Modal ----------

  function openModal(opts) {
    opts = opts || {};
    editingId = opts.id || null;
    formCat = opts.categoryId || "super";
    formKind = opts.kind || "gasto";
    var amount = opts.amount != null ? String(opts.amount).replace(".", ",") : "";

    var note = opts.note || "";

    var sheet = document.getElementById("sheet");

      '<div class="grab"></div>' +

      '<div class="kind-toggle" id="kindToggle">' +
      '<button type="button" data-kind="gasto" class="' + (!esIngreso ? "on-gasto" : "") + '">💸 Gasto</button>' +

      (opts.amountErr ? '<div class="note-err" style="margin-top:6px">' + esc(opts.amountErr) + "</div>" : "") +
      '</div>' +
      '<div class="field" id="catField"' + (esIngreso ? ' style="display:none"' : '') + '><label style="display:flex;justify-content:space-between;align-items:center">Categoría <button type="button" class="deduce-btn" id="deduceBtn">🔎 Deducir del concepto</button></label><div class="cat-grid" id="catGrid">' + catGrid(formCat) + '</div></div>' +
      '<div class="field"><label>Concepto (opcional)</label><input id="fNote" class="txt-input" type="text" placeholder="' + (esIngreso ? "p. ej. Sueldo" : "p. ej. Compra Jumbo") + '" value="' + esc(note) + '"></div>' +
      '<div class="field"><label>Fecha</label><input id="fDate" class="date-input" type="date" value="' + esc(date) + '"></div>' +
      '<div class="sheet-actions">' +
      (editingId ? '<button class="btn del-btn" id="delBtn">🗑</button>' : "") +
      '<button class="btn save-btn" id="saveBtn">' + (editingId ? "Guardar cambios" : "Guardar") + '</button>' +
      '</div>';

    document.getElementById("modal").classList.remove("hidden");

    // Interruptor Gasto/Ingreso
    document.getElementById("kindToggle").addEventListener("click", function (ev) {
      var b = ev.target.closest("[data-kind]");
      if (!b) return;
      formKind = b.getAttribute("data-kind");
      var ing = formKind === "ingreso";
      this.querySelector('[data-kind="gasto"]').className = ing ? "" : "on-gasto";
      this.querySelector('[data-kind="ingreso"]').className = ing ? "on-ingreso" : "";
      document.getElementById("catField").style.display = ing ? "none" : "";
    });

    document.getElementById("catGrid").addEventListener("click", function (ev) {
      var b = ev.target.closest(".cat-chip");
      if (!b) return;
      formCat = b.getAttribute("data-cat");
      Array.prototype.forEach.call(this.querySelectorAll(".cat-chip"), function (el) {

      });

    document.getElementById("saveBtn").addEventListener("click", saveFromModal);
    var del = document.getElementById("delBtn");
    if (del) del.addEventListener("click", deleteCurrent);
    var deduce = document.getElementById("deduceBtn");
    if (deduce) deduce.addEventListener("click", function () {
      var txt = document.getElementById("fNote").value.trim();
      if (!txt) { toast("Escribe primero el concepto"); document.getElementById("fNote").focus(); return; }
      var btn = this, prev = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-sm"></span> Pensando…';
      classifyFromText(txt, function (id) {
        btn.disabled = false; btn.innerHTML = prev;
        if (!id) { toast("No pude deducirlo"); return; }
        formCat = id;
        var grid = document.getElementById("catGrid");
        if (grid) Array.prototype.forEach.call(grid.querySelectorAll(".cat-chip"), function (el) {

    } else if (!editingId && !opts.amount) {
      setTimeout(function () { var a = document.getElementById("fAmount"); if (a) a.focus(); }, 250);
    }
